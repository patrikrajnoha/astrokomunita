name: CI Frontend

on:
  push:
    branches:
      - main
      - audit-fixes
  pull_request:
    branches:
      - main
      - audit-fixes

jobs:
  no-doc-files:
    name: Block markdown and txt files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail when markdown or txt files exist
        run: |
          forbidden_files="$(find . -type f \( -name '*.md' -o -name '*.MD' -o -name '*.txt' -o -name '*.TXT' \) \
            -not -path './vendor/*' \
            -not -path './node_modules/*' \
            -not -path './storage/*')"
          if [ -n "$forbidden_files" ]; then
            echo "Found forbidden documentation files:"
            echo "$forbidden_files"
            exit 1
          fi

  frontend:
    name: Vue lint, test, build
    runs-on: ubuntu-latest
    needs: no-doc-files
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
