          mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views bootstrap/cache

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Generate app key
        run: php artisan key:generate --force

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run Feature suite
        run: php artisan test --testsuite=Feature

  backend-bots-translation-sanity:
    name: Backend Bots/Translation sanity
    runs-on: ubuntu-latest
    needs: no-doc-files
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: testing
      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite
      CACHE_DRIVER: array
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      SESSION_DRIVER: array
      BROADCAST_DRIVER: log
      BROADCAST_CONNECTION: log
      FILES_DISK: public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, bcmath, curl, dom, exif, fileinfo, gd, intl, pcntl, pdo_sqlite, sqlite3, xml, xmlwriter, zip
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Prepare environment
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite
          mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views bootstrap/cache

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Generate app key
        run: php artisan key:generate --force

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run Bots/Translation sanity suite
        run: php artisan test --filter="BotRunServiceTest|BotRunnerLockTest|AdminBotControllerTest|BotTranslationServiceTest|RunBotSourceCommandTest|TranslationClientFailureMappingTest|TranslationHealthControllerTest"
