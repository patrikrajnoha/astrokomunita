name: CI Backend

on:
  push:
    branches:
      - main
      - audit-fixes
  pull_request:
    branches:
      - main
      - audit-fixes

jobs:
  no-doc-files:
    name: Block markdown and txt files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail when markdown or txt files exist
        run: |
          forbidden_files="$(find . -type f \( -name '*.md' -o -name '*.MD' -o -name '*.txt' -o -name '*.TXT' \) \
            -not -path './vendor/*' \
            -not -path './node_modules/*' \
            -not -path './storage/*')"
          if [ -n "$forbidden_files" ]; then
            echo "Found forbidden documentation files:"
            echo "$forbidden_files"
            exit 1
          fi

  backend-unit:
    name: Backend Unit tests (SQLite)
    runs-on: ubuntu-latest
    needs: no-doc-files
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: testing
      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite
      CACHE_DRIVER: array
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      SESSION_DRIVER: array
      BROADCAST_DRIVER: log
      BROADCAST_CONNECTION: log
      FILES_DISK: public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, bcmath, curl, dom, exif, fileinfo, gd, intl, pcntl, pdo_sqlite, sqlite3, xml, xmlwriter, zip
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Prepare environment
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite
          mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views bootstrap/cache

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Generate app key
        run: php artisan key:generate --force

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run Unit suite
        run: php artisan test --testsuite=Unit

  backend-feature:
    name: Backend Feature tests (SQLite)
    runs-on: ubuntu-latest
    needs: no-doc-files
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: testing
      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite
      CACHE_DRIVER: array
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      SESSION_DRIVER: array
      BROADCAST_DRIVER: log
      BROADCAST_CONNECTION: log
      FILES_DISK: public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, bcmath, curl, dom, exif, fileinfo, gd, intl, pcntl, pdo_sqlite, sqlite3, xml, xmlwriter, zip
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
