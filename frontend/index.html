<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b1220">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    >
    <title>Astrokomunita</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      (function () {
        var host = window.location.hostname
        var isLocal = host === '127.0.0.1' || host === 'localhost'
        if (!isLocal || !('serviceWorker' in navigator)) return

        navigator.serviceWorker.getRegistrations()
          .then(function (registrations) {
            return Promise.all(registrations.map(function (registration) {
              return registration.unregister()
            })).then(function () {
              return registrations.length
            })
          })
          .then(function (count) {
            if (!('caches' in window)) return count

            return caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (key) {
                return caches.delete(key)
              })).then(function () {
                return count
              })
            })
          })
          .then(function (count) {
            console.info('[APP SW] local pre-bootstrap guard active. Unregistered:', count)
          })
          .catch(function (error) {
            console.warn('[APP SW] local pre-bootstrap guard failed', error)
          })
      })()
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
