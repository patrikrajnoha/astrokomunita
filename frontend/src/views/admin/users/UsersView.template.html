
  <AdminPageShell class="usersPageShell" title="Používatelia">
    <div class="usersView">
      <div v-if="error" class="usersErrorBanner" role="alert">
        <span>{{ error }}</span>
        <button type="button" class="errorRetryBtn" :disabled="loading" @click="retryLoad">Skúsiť znova</button>
      </div>

      <div v-if="showSkeleton" class="usersSkeleton" aria-hidden="true">
        <div class="usersSkeletonToolbar">
          <span class="skeletonBlock is-wide"></span>
          <span class="skeletonBlock is-short"></span>
          <span class="skeletonBlock is-short"></span>
          <span class="skeletonBlock is-short"></span>
        </div>
        <div class="usersSkeletonTable">
          <span v-for="idx in 8" :key="`skeleton-row-${idx}`" class="skeletonRow"></span>
        </div>
      </div>

      <template v-else>
        <section class="usersFilters" aria-label="Filtre používateľov">
          <label class="usersFiltersLabel" for="users-search">Hľadaj používateľov</label>
          <div class="usersFiltersRow usersFiltersRow--search">
            <div class="searchInputWrap">
              <span class="searchIcon" aria-hidden="true">
                <svg viewBox="0 0 20 20" fill="none">
                  <circle cx="9" cy="9" r="5.5" stroke="currentColor" stroke-width="1.4" />
                  <path d="M13 13L17 17" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
                </svg>
              </span>
              <input
                id="users-search"
                v-model="searchInput"
                :disabled="loading"
                type="text"
                placeholder="Hľadaj používateľov..."
                autocomplete="off"
                class="usersSearchInput"
              />
              <button
                v-if="searchInput"
                type="button"
                class="searchClearBtn"
                aria-label="Vymazať hľadanie"
                :disabled="loading"
                @click="clearSearch"
              >
                <span aria-hidden="true">×</span>
              </button>
            </div>
          </div>

          <div class="usersFiltersRow usersFiltersRow--selects">
            <select
              v-model="filterRole"
              :disabled="loading"
              class="filterSelect"
              aria-label="Filtrovať podľa roly"
              @change="page = 1"
            >
              <option value="">Všetky roly</option>
              <option value="admin">Admin</option>
              <option value="editor">Editor</option>
              <option value="user">Používateľ</option>
            </select>

            <select
              v-model="filterStatus"
              :disabled="loading"
              class="filterSelect"
              aria-label="Filtrovať podľa stavu"
              @change="page = 1"
            >
              <option value="">Všetky stavy</option>
              <option value="active">Aktívny</option>
              <option value="banned">Zablokovaný</option>
              <option value="inactive">Neaktívny</option>
            </select>

            <div class="filtersSpacer"></div>

            <select
              id="users-per-page"
              v-model.number="perPage"
              :disabled="loading"
              class="perPageSelect"
              @change="page = 1"
            >
              <option :value="10">10</option>
              <option :value="20">20</option>
              <option :value="50">50</option>
            </select>
          </div>
        </section>

        <section class="usersTableWrap" aria-label="Tabuľka používateľov">
          <div class="usersTableScroll">
            <table class="usersTable">
              <thead>
                <tr>
                  <th class="col-user">Používateľ</th>
                  <th class="col-email">E-mail</th>
                  <th class="col-role">Rola</th>
                  <th class="col-status">Stav</th>
                  <th class="col-actions">Akcie</th>
                </tr>
              </thead>
              <tbody>
                <tr v-if="!rows.length">
                  <td colspan="5" class="usersEmptyState">
                    <div class="usersEmptyTitle">Nenašli sa žiadni používatelia</div>
                    <div class="usersEmptyText">Skúste upraviť filtre.</div>
                    <button
                      v-if="hasActiveFilters"
                      type="button"
                      class="emptyClearBtn"
                      :disabled="loading"
                      @click="clearFilters"
                    >
                      Vyčistiť filtre
                    </button>
                  </td>
                </tr>

                <tr
                  v-for="row in rows"
                  v-else
                  :key="row.id"
                  class="usersRow"
                  :data-row-id="row.id"
                  tabindex="0"
                  role="link"
                  @click="openUserDetail(row)"
                  @keydown.enter.prevent="openUserDetail(row)"
                  @keydown.space.prevent="openUserDetail(row)"
                >
                  <td data-label="Používateľ" class="col-user">
                    <div class="userCell">
                      <button
                        type="button"
                        class="avatarLink userInlineLink"
                        :aria-label="`Avatar ${userName(row)}`"
                        @click.stop="openUserDetail(row)"
                      >
                        <div class="avatar">
                          <UserAvatar class="avatarFallback" :user="row" :alt="`${userName(row)} avatar`" />
                        </div>
                      </button>
                      <div class="userMeta">
                        <button
                          type="button"
                          class="userLink"
                          :title="userName(row)"
                          @click.stop="openUserDetail(row)"
                        >
                          {{ userName(row) }}
                        </button>
                        <RouterLink
                          v-if="row.username"
                          :to="{ name: 'user-profile', params: { username: row.username } }"
                          class="userSubline userSublineLink"
                          :title="userHandle(row)"
                          @click.stop
                        >
                          {{ userHandle(row) }}
                        </RouterLink>
                        <span v-else class="userSubline" :title="userHandle(row)">
                          {{ userHandle(row) }}
                        </span>
                      </div>
                    </div>
                  </td>

                  <td data-label="E-mail" class="col-email">
                    <div class="emailCell">
                      <span v-if="isBotAccount(row)" class="badge roleBadge is-bot botEmailBadge" :title="botAccountHint()">bot účet</span>
                      <span v-else class="truncateText" :title="userEmail(row)">{{ userEmail(row) }}</span>
                    </div>
                  </td>

                  <td data-label="Rola" class="col-role">
                    <span class="badge roleBadge" :class="roleClass(row)">{{ roleLabel(row) }}</span>
                  </td>

                  <td data-label="Stav" class="col-status">
                    <div class="statusCell">
                      <span
                        class="badge statusBadge"
                        :class="statusClass(row)"
                        :title="row.is_banned && row.ban_reason ? row.ban_reason : undefined"
                      >
                        {{ statusLabel(row) }}
                      </span>
                    </div>
                  </td>

                  <td data-label="Akcie" class="col-actions" @click.stop>
                    <div class="rowActions">
                      <DropdownMenu
                        :items="rowActionItems(row)"
                        :label="`Akcie pre ${userName(row)}`"
                        menu-label="Akcie používateľa"
                        @select="onRowActionSelect(row, $event)"
                      >
                        <template #trigger>
                          <span class="rowMenuTrigger" aria-hidden="true">⋮</span>
                        </template>
                      </DropdownMenu>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <div v-if="shouldShowPagination" class="usersPaginationFooter">
          <div class="usersPaginationMeta">
            <span>Celkom: {{ totalUsers }}</span>
            <span class="paginationPageIndicator">Strana {{ currentPage }} z {{ lastPage }}</span>
          </div>
          <AdminPagination :meta="data" @page-change="page = $event" />
        </div>
        <div v-else-if="totalUsers > 0" class="usersPaginationFooter">
          <div class="usersPaginationMeta">Celkom: {{ totalUsers }}</div>
        </div>
      </template>

      <BaseModal
        :open="manageModalOpen"
        title="Správa účtu"
        compact
        test-id="manage-account-modal"
        close-test-id="manage-account-modal-close"
        @update:open="closeManageUserModal"
      >
        <template #description>
          <p v-if="manageUser" class="manageModalDescription">
            {{ userName(manageUser) }} <span class="manageModalHandle">{{ userHandle(manageUser) }}</span>
          </p>
        </template>

        <div class="manageModalContent">
          <p v-if="manageModalError" class="manageModalError">{{ manageModalError }}</p>
          <p v-else-if="manageModalLoading" class="manageModalLoading">Načítavam detail používateľa...</p>

          <template v-else-if="manageUser">
            <template v-if="manageModalView === 'summary'">
              <section class="manageIdentityCard">
              <div class="manageIdentityMain">
                <div class="avatar manageIdentityAvatar">
                  <UserAvatar class="avatarFallback" :user="manageUser" :alt="`${userName(manageUser)} avatar`" />
                </div>
                <div class="manageIdentityText">
                  <h3 class="manageIdentityName">{{ userName(manageUser) }}</h3>
                  <p class="manageIdentityHandle">{{ userHandle(manageUser) }}</p>
                  <div class="manageIdentityBadges">
                    <span class="badge roleBadge" :class="roleClass(manageUser)">{{ roleLabel(manageUser) }}</span>
                    <span class="badge statusBadge" :class="statusClass(manageUser)">{{ statusLabel(manageUser) }}</span>
                  </div>
                </div>
              </div>

              <div class="manageIdentityActions">
                <button
                  type="button"
                  class="manageActionBtn manageActionBtn--primary"
                  @click="openUserDetailPage(manageUser)"
                >
                  Otvoriť detail
                </button>
                <button
                  v-if="manageUser.username"
                  type="button"
                  class="manageActionBtn manageActionBtn--ghost"
                  @click="openPublicProfile(manageUser)"
                >
                  Zobraziť profil
                </button>
              </div>
            </section>

            <div class="manageDetailGrid">
              <section class="manageDetailCard">
                <h4 class="manageCardTitle">Informácie o účte</h4>
                <dl class="manageInfoList">
                  <template v-for="item in manageAccountInfoRows" :key="item.key">
                    <div v-if="item.value && item.value !== '–' && item.value !== '-'" class="manageInfoItem">
                      <dt>{{ item.label }}</dt>
                      <dd>{{ item.value }}</dd>
                    </div>
                  </template>
                </dl>
              </section>

              <section class="manageDetailCard">
                <h4 class="manageCardTitle">Oprávnenia a roly</h4>
                <div class="manageRoleRows">
                  <div class="manageRoleRow">
                    <span>Aktuálna rola</span>
                    <span class="badge roleBadge" :class="roleClass(manageUser)">{{ roleLabel(manageUser) }}</span>
                  </div>
                </div>

                <div v-if="canToggleEditorRole(manageUser)" class="manageModalActions">
                  <button
                    v-if="String(manageUser.role || '').toLowerCase() === 'user'"
                    type="button"
                    class="manageActionBtn"
                    @click="updateEditorRole(manageUser, 'editor')"
                  >
                    Pridať rolu editor
                  </button>

                  <button
                    v-if="String(manageUser.role || '').toLowerCase() === 'editor'"
                    type="button"
                    class="manageActionBtn is-danger"
                    @click="updateEditorRole(manageUser, 'user')"
                  >
                    Odobrať rolu editor
                  </button>
                </div>
              </section>

              <section class="manageDetailCard manageFullCard">
                <h4 class="manageCardTitle">Moderácia</h4>
                <div v-if="canManageAccount(manageUser)" class="manageModalActions manageModalActions--row">
                  <button
                    v-if="!manageUser.is_banned"
                    type="button"
                    class="manageActionBtn is-danger"
                    @click="banUser(manageUser)"
                  >
                    Zablokovať účet
                  </button>

                  <button
                    v-if="manageUser.is_banned"
                    type="button"
                    class="manageActionBtn"
                    @click="unbanUser(manageUser)"
                  >
                    Odblokovať účet
                  </button>

                  <button
                    v-if="manageUser.is_active"
                    type="button"
                    class="manageActionBtn is-danger"
                    @click="deactivateUser(manageUser)"
                  >
                    Deaktivovať účet
                  </button>

                  <button
                    v-if="!manageUser.is_active"
                    type="button"
                    class="manageActionBtn"
                    @click="reactivateUser(manageUser)"
                  >
                    Reaktivovať účet
                  </button>
                </div>

                <p v-else class="manageReadonlyHint">Pre tento účet nie sú moderačné akcie povolené.</p>
              </section>

              <section v-if="canManageAccount(manageUser)" class="manageDetailCard manageDangerCard">
                <h4 class="manageCardTitle">Kritické akcie</h4>
                <div class="manageModalActions">
                  <button
                    type="button"
                    class="manageActionBtn is-danger"
                    @click="resetProfile(manageUser)"
                  >
                    Resetovať profil
                  </button>
                </div>
              </section>
            </div>
            </template>

            <div v-else class="manageEmbeddedDetail">
              <div class="manageEmbeddedDetail__top">
                <button type="button" class="manageActionBtn manageActionBtn--ghost" @click="manageModalView = 'summary'">
                  Späť na prehľad
                </button>
              </div>
              <AdminUserDetailView embedded :user-id="manageUser.id" />
            </div>
          </template>
        </div>
      </BaseModal>
    </div>
  </AdminPageShell>
