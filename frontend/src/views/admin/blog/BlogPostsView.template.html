<div class="admin-blog">
  <header class="blog-header">
    <div class="blog-header__title">
      <h1>Články</h1>
    </div>
    <div class="blog-header__actions">
      <div class="search-wrap">
        <input v-model="query" type="search" placeholder="Hľadať…" class="search-input" />
        <button v-if="hasQuery" type="button" class="clear-btn ghost" @click="clearQuery" aria-label="Vyčistiť">×</button>
      </div>

      <select :value="status" :disabled="loading" class="filter-select" @change="setStatusFilter($event.target.value)">
        <option value="">Všetky stavy</option>
        <option value="draft">Koncepty</option>
        <option value="scheduled">Naplánované</option>
        <option value="published">Publikované</option>
        <option value="hidden">Skryté</option>
      </select>

      <button class="btn-primary" type="button" :disabled="saving || deleting" @click="handleNewPost">
        + Nový článok
      </button>
    </div>
  </header>

  <div v-if="error" class="error-banner">{{ error }}</div>

  <div class="blog-layout" :class="{ 'is-editing': isEditing, 'list-collapsed': isListCollapsed }">

    <!-- ─── LIST SIDEBAR ─────────────────────────────────── -->
    <aside class="article-list">
      <div class="list-top">
        <span class="muted small list-top-label">{{ pageRangeLabel }}</span>
        <button class="ghost icon-btn" type="button" :disabled="loading" title="Obnoviť" @click="load">
          <svg viewBox="0 0 20 20" fill="none" width="14" height="14" aria-hidden="true">
            <path d="M4 10a6 6 0 1 0 1.1-3.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M4 6v4h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button
          class="ghost icon-btn list-collapse-btn"
          type="button"
          :title="isListCollapsed ? 'Zobraziť zoznam' : 'Skryť zoznam'"
          @click="isListCollapsed = !isListCollapsed"
        >
          <svg viewBox="0 0 20 20" fill="none" width="14" height="14" aria-hidden="true">
            <path v-if="!isListCollapsed" d="M13 5l-5 5 5 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            <path v-else d="M7 5l5 5-5 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div class="list-scroll">
        <div v-if="loading" class="list-state muted">Načítavam…</div>

        <template v-else>
          <button
            v-for="post in posts"
            :key="post.id"
            type="button"
            class="article-card"
            :class="{ 'is-active': post.id === selectedId }"
            @click="selectPost(post)"
          >
            <div class="ac-title">{{ post.title || '(Bez názvu)' }}</div>
            <div class="ac-foot">
              <span class="muted small">{{ formatDate(post.published_at || post.created_at) }}</span>
              <span class="status-pill" :class="`status-pill--${computeStatus(post)}`">
                {{ statusLabel(computeStatus(post)) }}
              </span>
            </div>
            <div v-if="computeStatus(post) === 'published'" class="ac-stats">
              <span class="stat-chip" :title="`Prečítania: ${formatMetricCount(postReadCount(post))}`">
                <svg viewBox="0 0 20 20" fill="none" width="11" height="11" aria-hidden="true">
                  <path d="M2 10C3.6 6.9 6.6 5 10 5C13.4 5 16.4 6.9 18 10C16.4 13.1 13.4 15 10 15C6.6 15 3.6 13.1 2 10Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  <circle cx="10" cy="10" r="2.3" stroke="currentColor" stroke-width="1.5"/>
                </svg>
                {{ formatMetricCount(postReadCount(post)) }}
              </span>
              <span class="stat-chip" :title="`Kliky: ${formatMetricCount(postClickCount(post))}`">
                <svg viewBox="0 0 20 20" fill="none" width="11" height="11" aria-hidden="true">
                  <path d="M10 3V17M5 7l5-4 5 4M5 13l5 4 5-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                {{ formatMetricCount(postClickCount(post)) }}
              </span>
            </div>
          </button>

          <div v-if="posts.length === 0" class="list-state muted">Nenašli sa žiadne články.</div>
        </template>
      </div>

      <div class="list-foot">
        <button class="ghost pager-btn" type="button" :disabled="loading || page <= 1" @click="prevPage">‹</button>
        <span class="muted small">{{ page }}</span>
        <button class="ghost pager-btn" type="button" :disabled="loading || (data && page >= data.last_page)" @click="nextPage">›</button>
      </div>
    </aside>

    <!-- ─── EDITOR AREA ───────────────────────────────────── -->
    <div class="editor-area">

      <!-- Empty state -->
      <div v-if="!isEditing" class="editor-empty">
        <p class="muted">Vyber článok alebo vytvor nový</p>
      </div>

      <template v-else>
        <!-- Topbar -->
        <div class="editor-bar">
          <div class="editor-bar__left">
            <button class="ghost mobile-back" type="button" @click="handleBack">← Späť</button>
            <span class="save-state" :class="saveStateClass">{{ saveStateLabel }}</span>
            <span v-if="selectedPost?.updated_at || selectedPost?.published_at" class="muted small editor-ts">
              {{ formatDate(selectedPost?.updated_at || selectedPost?.published_at) }}
            </span>
          </div>
          <div class="editor-bar__right">
            <button class="ghost" type="button" :disabled="saving || deleting" @click="showPreview = !showPreview">
              {{ showPreview ? 'Upraviť' : 'Náhľad' }}
            </button>
            <button
              class="ghost"
              type="button"
              :class="{ 'is-active': isSettingsOpen }"
              :disabled="saving || deleting"
              @click="toggleSettings"
            >
              Nastavenia
            </button>
            <button class="ghost" type="button" :disabled="saving || deleting" @click="save">
              {{ saving ? 'Ukladám…' : 'Uložiť' }}
            </button>
            <button
              v-if="selectedStatus === 'draft'"
              class="btn-primary"
              type="button"
              :disabled="saving || deleting || !canPublishNow"
              :title="!canPublishNow ? publishDisabledReason : ''"
              @click="publishNow"
            >
              Publikovať
            </button>
            <button
              v-else
              class="ghost"
              type="button"
              :disabled="saving || deleting"
              @click="unpublish"
            >
              Zrušiť publikovanie
            </button>
          </div>
        </div>

        <p v-if="selectedStatus === 'draft' && !canPublishNow" class="publish-hint">
          {{ publishDisabledReason }}
        </p>

        <div v-if="formError" class="error-banner" style="margin: 0 12px;">{{ formError }}</div>

        <!-- Split: content + settings drawer -->
        <div class="editor-split" :class="{ 'settings-open': isSettingsOpen }">

          <!-- Content -->
          <div class="editor-content">
            <div class="title-block">
              <input
                v-model="form.title"
                type="text"
                class="title-input"
                placeholder="Nadpis článku…"
              />
              <div class="title-meta">
                <span :class="['char-counter', { 'is-warn': titleLength > 70 }]">{{ titleLength }}/70</span>
                <span class="muted small">{{ contentWordCount }} slov</span>
                <code class="slug-preview">/articles/{{ titleSlugPreview }}</code>
              </div>
            </div>

            <!-- Preview -->
            <div v-if="showPreview" class="article-preview">
              <div class="preview-top">
                <span class="preview-label">Náhľad</span>
                <span class="muted small">{{ readTimeFor(form.content) }}</span>
              </div>
              <h2 class="preview-title">{{ form.title || 'Bez názvu' }}</h2>
              <div v-if="coverPreview" class="preview-cover">
                <img :src="coverPreview" alt="Cover" />
              </div>
              <aside v-if="previewToc.length >= 3" class="preview-toc">
                <div class="toc-heading">Obsah</div>
                <ul>
                  <li v-for="item in previewToc" :key="item.id" :class="item.type">{{ item.text }}</li>
                </ul>
              </aside>
              <div class="preview-body preview-content--article" v-html="previewHtml"></div>
            </div>

            <!-- Edit -->
            <div v-else class="content-block">
              <ArticleRichEditor
                v-model="form.content"
                class="content-rich-editor content-rich-editor--minimal"
                :min-height="520"
                placeholder="Napíš obsah článku…"
                :image-upload-handler="uploadInlineImage"
              />
              <div class="content-foot">
                <span class="muted small">{{ readTimeFor(form.content) }}</span>
                <span class="muted small">{{ contentWordCount }} slov</span>
              </div>
            </div>
          </div>

          <!-- Settings drawer -->
          <aside v-if="isSettingsOpen" class="settings-drawer" role="complementary" aria-label="Nastavenia článku">

            <section class="drawer-section">
              <h3>Tagy</h3>
              <input v-model="tagsInput" type="text" placeholder="planéty, kométy, pozorovanie" />

              <div class="ai-suggest">
                <div class="ai-suggest__row">
                  <button
                    type="button"
                    class="ghost ai-suggest__btn"
                    :disabled="aiTagSuggestionsLoading || saving || deleting"
                    @click="suggestAiTags"
                  >
                    <svg viewBox="0 0 20 20" fill="none" width="12" height="12" aria-hidden="true">
                      <path d="M10 2l1.8 5.4H17l-4.4 3.2 1.7 5.4L10 13l-3.7 2.4 1.7-5.4L4 7.6h5.2L10 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                    </svg>
                    {{ aiSuggestActionLabel }}
                  </button>
                  <button
                    v-if="aiTagSuggestions.length"
                    type="button"
                    class="btn-primary ai-suggest__apply"
                    :disabled="!hasSelectedAiTagSuggestions || saving || deleting"
                    @click="applySelectedAiTags"
                  >Pridať ({{ aiTagSuggestions.filter(t => t.checked).length }})</button>
                </div>

                <label class="ai-allow-new-label">
                  <input
                    type="checkbox"
                    :checked="aiTagSuggestionMode === 'allow_new'"
                    :disabled="aiTagSuggestionsLoading"
                    @change="setAiTagSuggestionMode($event.target.checked ? 'allow_new' : 'existing_only')"
                  />
                  <span class="muted small">Navrhovať aj nové tagy</span>
                </label>

                <div v-if="aiTagSuggestionsLoading" class="ai-loading" role="status" aria-live="polite">
                  <span class="ai-loading__percent muted small">{{ Math.round(aiLoadingPercent) }}%</span>
                  <div class="ai-loading__bar" aria-hidden="true">
                    <span class="ai-loading__fill" :style="{ width: aiLoadingPercent + '%' }"></span>
                  </div>
                </div>

                <p v-if="aiTagSuggestionsError" class="error-text">{{ aiTagSuggestionsError }}</p>

                <div v-if="aiTagSuggestions.length" class="ai-pills">
                  <button
                    v-for="(item, index) in aiTagSuggestions"
                    :key="`ai-tag-${item.id}-${index}`"
                    type="button"
                    class="ai-pill"
                    :class="{ 'is-selected': item.checked }"
                    :title="item.reason"
                    @click="item.checked = !item.checked"
                  >{{ item.name }}<span v-if="item.id === 0" class="ai-pill__new">nový</span></button>
                </div>
              </div>
            </section>

            <section class="drawer-section">
              <h3>Publikovanie</h3>
              <label class="field-label">
                <span class="muted small">Dátum a čas</span>
                <input v-model="form.published_at" type="datetime-local" />
              </label>
              <div class="row-actions">
                <button class="ghost" type="button" :disabled="saving || deleting" @click="setPublishNow">Teraz</button>
                <button class="ghost" type="button" :disabled="saving || deleting || !form.published_at" @click="form.published_at = ''">Ponechať ako koncept</button>
              </div>
              <button
                v-if="selectedStatus === 'published' && !selectedPost?.is_hidden"
                class="ghost"
                type="button"
                :disabled="saving || deleting"
                @click="hidePublished"
              >Skryť článok</button>
              <button
                v-if="selectedStatus === 'hidden'"
                class="ghost"
                type="button"
                :disabled="saving || deleting"
                @click="unhidePublished"
              >Zobraziť článok</button>
            </section>

            <section class="drawer-section">
              <h3>Titulný obrázok</h3>
              <input
                ref="coverInputEl"
                type="file"
                accept="image/*"
                class="cover-file-input"
                @change="onCoverChange"
              />
              <div class="cover-file-control">
                <button type="button" class="cover-file-control__button" @click="openCoverPicker">
                  Vybrať súbor
                </button>
                <span class="cover-file-control__label">{{ coverInputLabel }}</span>
              </div>
              <p v-if="coverFile" class="muted small cover-file-state">
                Vybraný súbor: {{ coverFile.name }}
              </p>
              <p v-else-if="coverPreview" class="muted small cover-file-state">
                Používa sa aktuálny uložený obrázok.
              </p>
              <p v-else class="muted small cover-file-state">
                Žiadny obrázok nie je vybraný.
              </p>
              <div v-if="coverPreview" class="cover-thumb">
                <img :src="coverPreview" alt="Cover" />
              </div>
            </section>

            <section class="drawer-section">
              <h3>Kontrolný zoznam</h3>
              <div class="checklist">
                <span
                  v-for="item in publishChecklist"
                  :key="`chk-${item.key}`"
                  class="check-chip"
                  :class="{ done: item.done, required: item.required && !item.done }"
                >{{ item.done ? '✓' : '✗' }} {{ item.label }}</span>
              </div>
            </section>

            <section class="drawer-section drawer-section--danger">
              <button
                v-if="isEditing"
                class="btn-danger"
                type="button"
                :disabled="saving || deleting"
                @click="remove"
              >{{ deleting ? 'Mažem…' : 'Vymazať článok' }}</button>
            </section>

          </aside>
        </div>
      </template>
    </div>

  </div>
</div>
