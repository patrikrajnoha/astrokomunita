<div class="admin-blog">

  <!-- ─── Header ─────────────────────────────────────────── -->
  <header class="flex items-center justify-between gap-3 flex-wrap px-1">
    <h1 class="m-0 text-xl font-bold text-white">Články</h1>
    <div class="flex items-center gap-2 flex-wrap">
      <div class="relative flex items-center">
        <input
          v-model="query"
          type="search"
          placeholder="Hľadať…"
          class="h-9 w-48 pl-3 pr-8 rounded-xl bg-hover text-white text-sm border-0 placeholder:text-muted/50 focus:outline-none focus:ring-2 focus:ring-vivid/40"
        />
        <button
          v-if="hasQuery"
          type="button"
          class="absolute right-2 w-5 h-5 flex items-center justify-center rounded-lg bg-secondary-btn text-muted text-xs border-0 cursor-pointer hover:opacity-75 transition-opacity"
          aria-label="Vyčistiť"
          @click="clearQuery"
        >×</button>
      </div>

      <select
        :value="status"
        :disabled="loading"
        class="h-9 px-3 rounded-xl bg-hover text-muted text-sm border-0 cursor-pointer appearance-none focus:outline-none focus:ring-2 focus:ring-vivid/40 disabled:opacity-50"
        @change="setStatusFilter($event.target.value)"
      >
        <option value="">Všetky stavy</option>
        <option value="draft">Koncepty</option>
        <option value="scheduled">Naplánované</option>
        <option value="published">Publikované</option>
        <option value="hidden">Skryté</option>
      </select>

      <button
        class="h-9 px-4 rounded-xl bg-vivid text-white text-sm font-semibold border-0 cursor-pointer hover:opacity-85 disabled:opacity-50 transition-opacity"
        type="button"
        :disabled="saving || deleting"
        @click="handleNewPost"
      >+ Nový článok</button>
    </div>
  </header>

  <div v-if="error" class="px-4 py-2.5 rounded-xl bg-danger/10 text-danger text-sm">{{ error }}</div>

  <!-- ─── Main layout ─────────────────────────────────────── -->
  <div class="blog-layout" :class="{ 'is-editing': isEditing, 'list-collapsed': isListCollapsed }">

    <!-- ─── Article list sidebar ────────────────────────── -->
    <aside class="article-list flex flex-col rounded-xl bg-hover min-h-0 overflow-hidden">
      <div class="list-top flex items-center justify-between px-3 py-2 border-b border-white/5 flex-shrink-0 gap-2">
        <span class="list-top-label text-muted text-xs truncate">{{ pageRangeLabel }}</span>
        <div class="flex items-center gap-1 flex-shrink-0">
          <button
            class="icon-btn w-7 h-7 flex items-center justify-center rounded-lg text-muted border-0 bg-transparent cursor-pointer hover:bg-secondary-btn transition-colors disabled:opacity-40"
            type="button"
            :disabled="loading"
            title="Obnoviť"
            @click="load"
          >
            <svg viewBox="0 0 20 20" fill="none" width="13" height="13" aria-hidden="true">
              <path d="M4 10a6 6 0 1 0 1.1-3.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M4 6v4h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button
            class="list-collapse-btn icon-btn w-7 h-7 flex items-center justify-center rounded-lg text-muted border-0 bg-transparent cursor-pointer hover:bg-secondary-btn transition-colors"
            type="button"
            :title="isListCollapsed ? 'Zobraziť zoznam' : 'Skryť zoznam'"
            @click="isListCollapsed = !isListCollapsed"
          >
            <svg viewBox="0 0 20 20" fill="none" width="13" height="13" aria-hidden="true">
              <path v-if="!isListCollapsed" d="M13 5l-5 5 5 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <path v-else d="M7 5l5 5-5 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="list-scroll flex-1 overflow-y-auto p-1.5 flex flex-col gap-0.5">
        <div v-if="loading" class="py-8 text-center text-muted text-xs">Načítavam…</div>

        <template v-else>
          <button
            v-for="post in posts"
            :key="post.id"
            type="button"
            class="article-card w-full text-left rounded-xl px-3 py-2.5 cursor-pointer flex-shrink-0 transition-colors border-0"
            :class="post.id === selectedId ? 'bg-vivid/10' : 'bg-transparent hover:bg-secondary-btn'"
            @click="selectPost(post)"
          >
            <div class="ac-title text-sm font-semibold leading-snug text-white">{{ post.title || '(Bez názvu)' }}</div>
            <div class="flex items-center justify-between gap-2 mt-1.5">
              <span class="text-muted" style="font-size:11px">{{ formatDate(post.published_at || post.created_at) }}</span>
              <span class="status-pill" :class="`status-pill--${computeStatus(post)}`">{{ statusLabel(computeStatus(post)) }}</span>
            </div>
            <div v-if="computeStatus(post) === 'published'" class="flex gap-1.5 mt-1.5">
              <span class="stat-chip" :title="`Prečítania: ${formatMetricCount(postReadCount(post))}`">
                <svg viewBox="0 0 20 20" fill="none" width="10" height="10" aria-hidden="true">
                  <path d="M2 10C3.6 6.9 6.6 5 10 5C13.4 5 16.4 6.9 18 10C16.4 13.1 13.4 15 10 15C6.6 15 3.6 13.1 2 10Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  <circle cx="10" cy="10" r="2.3" stroke="currentColor" stroke-width="1.5"/>
                </svg>
                {{ formatMetricCount(postReadCount(post)) }}
              </span>
              <span class="stat-chip" :title="`Kliky: ${formatMetricCount(postClickCount(post))}`">
                <svg viewBox="0 0 20 20" fill="none" width="10" height="10" aria-hidden="true">
                  <path d="M10 3V17M5 7l5-4 5 4M5 13l5 4 5-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                {{ formatMetricCount(postClickCount(post)) }}
              </span>
            </div>
          </button>

          <div v-if="posts.length === 0" class="py-8 text-center text-muted text-xs">Nenašli sa žiadne články.</div>
        </template>
      </div>

      <div class="list-foot flex items-center justify-between px-3 py-2 border-t border-white/5 flex-shrink-0">
        <button
          class="pager-btn w-8 h-8 flex items-center justify-center rounded-xl text-muted border-0 bg-transparent cursor-pointer hover:bg-secondary-btn transition-colors disabled:opacity-40 text-base leading-none"
          type="button"
          :disabled="loading || page <= 1"
          @click="prevPage"
        >‹</button>
        <span class="text-muted text-xs">{{ page }}</span>
        <button
          class="pager-btn w-8 h-8 flex items-center justify-center rounded-xl text-muted border-0 bg-transparent cursor-pointer hover:bg-secondary-btn transition-colors disabled:opacity-40 text-base leading-none"
          type="button"
          :disabled="loading || (data && page >= data.last_page)"
          @click="nextPage"
        >›</button>
      </div>
    </aside>

    <!-- ─── Editor area ──────────────────────────────────── -->
    <div class="editor-area flex flex-col rounded-xl bg-hover min-h-0 overflow-hidden">

      <div v-if="!isEditing" class="flex-1 flex items-center justify-center">
        <p class="text-muted text-sm m-0">Vyber článok alebo vytvor nový</p>
      </div>

      <template v-else>
        <!-- Topbar -->
        <div class="editor-bar flex items-center justify-between gap-2 px-4 py-2 border-b border-white/5 flex-shrink-0 flex-wrap">
          <div class="flex items-center gap-3 min-w-0">
            <button class="mobile-back text-muted text-sm border-0 bg-transparent cursor-pointer hover:text-white transition-colors p-0 min-h-0" type="button" @click="handleBack">← Späť</button>
            <span class="save-state text-xs font-medium" :class="saveStateClass">{{ saveStateLabel }}</span>
            <span v-if="selectedPost?.updated_at || selectedPost?.published_at" class="text-muted whitespace-nowrap" style="font-size:11px">
              {{ formatDate(selectedPost?.updated_at || selectedPost?.published_at) }}
            </span>
          </div>
          <div class="editor-bar__right flex items-center gap-1.5 flex-wrap">
            <button
              class="h-8 px-3 rounded-xl bg-secondary-btn text-muted text-xs font-semibold border-0 cursor-pointer hover:opacity-85 disabled:opacity-50 transition-opacity"
              type="button"
              :disabled="saving || deleting"
              @click="showPreview = !showPreview"
            >{{ showPreview ? 'Upraviť' : 'Náhľad' }}</button>

            <button
              class="h-8 px-3 rounded-xl text-xs font-semibold border-0 cursor-pointer hover:opacity-85 disabled:opacity-50 transition-opacity"
              :class="isSettingsOpen ? 'bg-vivid/15 text-vivid' : 'bg-secondary-btn text-muted'"
              type="button"
              :disabled="saving || deleting"
              @click="toggleSettings"
            >Nastavenia</button>

            <button
              class="h-8 px-3 rounded-xl bg-secondary-btn text-muted text-xs font-semibold border-0 cursor-pointer hover:opacity-85 disabled:opacity-50 transition-opacity"
              type="button"
              :disabled="saving || deleting"
              @click="save"
            >{{ saving ? 'Ukladám…' : 'Uložiť' }}</button>

            <button
              v-if="selectedStatus === 'draft'"
              class="h-8 px-4 rounded-xl bg-vivid text-white text-xs font-semibold border-0 cursor-pointer hover:opacity-85 disabled:opacity-50 transition-opacity"
              type="button"
              :disabled="saving || deleting || !canPublishNow"
              :title="!canPublishNow ? publishDisabledReason : ''"
              @click="publishNow"
            >Publikovať</button>

            <button
              v-else
              class="h-8 px-3 rounded-xl bg-secondary-btn text-muted text-xs font-semibold border-0 cursor-pointer hover:opacity-85 disabled:opacity-50 transition-opacity"
              type="button"
              :disabled="saving || deleting"
              @click="unpublish"
            >Zrušiť pub.</button>
          </div>
        </div>

        <p v-if="selectedStatus === 'draft' && !canPublishNow" class="m-0 px-4 py-1.5 text-xs text-yellow-400 flex-shrink-0">
          {{ publishDisabledReason }}
        </p>

        <div v-if="formError" class="mx-4 mt-1 px-3 py-2 rounded-xl bg-danger/10 text-danger text-xs flex-shrink-0">{{ formError }}</div>

        <!-- Content + Settings drawer -->
        <div class="editor-split flex flex-1 min-h-0 overflow-hidden" :class="{ 'settings-open': isSettingsOpen }">

          <!-- Main content -->
          <div class="editor-content flex-1 min-w-0 overflow-y-auto p-4 flex flex-col gap-3">

            <div class="rounded-xl bg-app/50 p-3 flex flex-col gap-2">
              <input
                v-model="form.title"
                type="text"
                class="title-input w-full rounded-xl bg-secondary-btn text-white px-4 py-2.5 border-0 font-bold placeholder:text-muted/40 focus:outline-none focus:ring-2 focus:ring-vivid/40"
                placeholder="Nadpis článku…"
              />
              <div class="flex flex-wrap gap-x-4 gap-y-1 items-center">
                <span class="text-xs" :class="titleLength > 70 ? 'text-yellow-400' : 'text-muted'">{{ titleLength }}/70</span>
                <span class="text-muted text-xs">{{ contentWordCount }} slov</span>
                <code class="text-xs text-muted bg-app/60 rounded-lg px-2 py-0.5">/articles/{{ titleSlugPreview }}</code>
              </div>
            </div>

            <!-- Preview -->
            <div v-if="showPreview" class="article-preview rounded-xl p-5">
              <div class="flex justify-between items-center gap-2 mb-3">
                <span class="text-xs uppercase tracking-widest" style="color:#6b7280">Náhľad</span>
                <span class="text-xs" style="color:#6b7280">{{ readTimeFor(form.content) }}</span>
              </div>
              <h2 class="preview-title m-0" style="font-size:clamp(1.2rem,2.2vw,1.7rem);color:#111827">{{ form.title || 'Bez názvu' }}</h2>
              <div v-if="coverPreview" class="mt-3 rounded-xl overflow-hidden border border-gray-200">
                <img :src="coverPreview" alt="Cover" class="w-full max-h-64 object-cover block" />
              </div>
              <aside v-if="previewToc.length >= 3" class="mt-3 rounded-xl p-3 bg-gray-50 border border-gray-200">
                <div class="text-xs uppercase tracking-widest mb-2" style="color:#9ca3af">Obsah</div>
                <ul class="list-none m-0 p-0 grid gap-1 text-sm" style="color:#374151">
                  <li v-for="item in previewToc" :key="item.id" :class="item.type === 'h2' ? 'pl-2' : item.type === 'h3' ? 'pl-4' : ''">{{ item.text }}</li>
                </ul>
              </aside>
              <div class="preview-body preview-content--article mt-3" v-html="previewHtml"></div>
            </div>

            <!-- Edit -->
            <div v-else class="rounded-xl bg-app/50 p-3 flex flex-col gap-2">
              <ArticleRichEditor
                v-model="form.content"
                class="content-rich-editor content-rich-editor--minimal w-full"
                :min-height="520"
                placeholder="Napíš obsah článku…"
                :image-upload-handler="uploadInlineImage"
              />
              <div class="flex justify-between gap-2">
                <span class="text-muted text-xs">{{ readTimeFor(form.content) }}</span>
                <span class="text-muted text-xs">{{ contentWordCount }} slov</span>
              </div>
            </div>
          </div>

          <!-- Settings drawer -->
          <aside v-if="isSettingsOpen" class="settings-drawer bg-app flex flex-col overflow-y-auto" role="complementary" aria-label="Nastavenia článku">

            <section class="p-4 border-b border-white/5 flex flex-col gap-3">
              <h3 class="m-0 text-xs font-semibold uppercase tracking-widest text-muted">Tagy</h3>
              <input
                v-model="tagsInput"
                type="text"
                placeholder="planéty, kométy, pozorovanie"
                class="w-full rounded-xl bg-hover text-white text-sm px-3 py-2 border-0 placeholder:text-muted/50 focus:outline-none focus:ring-2 focus:ring-vivid/40"
              />

              <div class="flex flex-col gap-2">
                <div class="flex items-center gap-2">
                  <button
                    type="button"
                    class="inline-flex items-center gap-1.5 h-7 px-3 rounded-xl bg-secondary-btn text-muted text-xs font-medium border-0 cursor-pointer hover:opacity-85 disabled:opacity-50 transition-opacity"
                    :disabled="aiTagSuggestionsLoading || saving || deleting"
                    @click="suggestAiTags"
                  >
                    <svg viewBox="0 0 20 20" fill="none" width="11" height="11" aria-hidden="true">
                      <path d="M10 2l1.8 5.4H17l-4.4 3.2 1.7 5.4L10 13l-3.7 2.4 1.7-5.4L4 7.6h5.2L10 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                    </svg>
                    {{ aiSuggestActionLabel }}
                  </button>
                  <button
                    v-if="aiTagSuggestions.length"
                    type="button"
                    class="inline-flex items-center h-7 px-3 rounded-xl bg-vivid text-white text-xs font-semibold border-0 cursor-pointer hover:opacity-85 disabled:opacity-50 transition-opacity"
                    :disabled="!hasSelectedAiTagSuggestions || saving || deleting"
                    @click="applySelectedAiTags"
                  >Pridať ({{ aiTagSuggestions.filter(t => t.checked).length }})</button>
                </div>

                <label class="inline-flex items-center gap-2 cursor-pointer select-none">
                  <input
                    type="checkbox"
                    :checked="aiTagSuggestionMode === 'allow_new'"
                    :disabled="aiTagSuggestionsLoading"
                    @change="setAiTagSuggestionMode($event.target.checked ? 'allow_new' : 'existing_only')"
                  />
                  <span class="text-muted text-xs">Navrhovať aj nové tagy</span>
                </label>

                <div v-if="aiTagSuggestionsLoading" class="flex flex-col gap-1" role="status" aria-live="polite">
                  <span class="text-muted text-xs tabular-nums">{{ Math.round(aiLoadingPercent) }}%</span>
                  <div class="w-full h-1 rounded-full bg-white/10 overflow-hidden" aria-hidden="true">
                    <span class="ai-loading__fill block h-full rounded-full bg-vivid" :style="{ width: aiLoadingPercent + '%' }"></span>
                  </div>
                </div>

                <p v-if="aiTagSuggestionsError" class="m-0 text-xs text-danger">{{ aiTagSuggestionsError }}</p>

                <div v-if="aiTagSuggestions.length" class="flex flex-wrap gap-1.5">
                  <button
                    v-for="(item, index) in aiTagSuggestions"
                    :key="`ai-tag-${item.id}-${index}`"
                    type="button"
                    class="inline-flex items-center gap-1 h-7 px-3 rounded-full text-xs border-0 cursor-pointer transition-all whitespace-nowrap"
                    :class="item.checked ? 'bg-vivid/15 text-vivid' : 'bg-secondary-btn text-muted hover:opacity-85'"
                    :title="item.reason"
                    @click="item.checked = !item.checked"
                  >{{ item.name }}<span v-if="item.id === 0" class="text-vivid/70 font-semibold uppercase ml-0.5" style="font-size:9px;letter-spacing:.04em">nový</span></button>
                </div>
              </div>
            </section>

            <section class="p-4 border-b border-white/5 flex flex-col gap-3">
              <h3 class="m-0 text-xs font-semibold uppercase tracking-widest text-muted">Publikovanie</h3>
              <label class="flex flex-col gap-1.5">
                <span class="text-muted text-xs">Dátum a čas</span>
                <input
                  v-model="form.published_at"
                  type="datetime-local"
                  class="rounded-xl bg-hover text-white text-sm px-3 py-2 border-0 focus:outline-none focus:ring-2 focus:ring-vivid/40 disabled:opacity-50"
                />
              </label>
              <div class="flex gap-2">
                <button
                  class="flex-1 h-8 rounded-xl bg-secondary-btn text-muted text-xs font-medium border-0 cursor-pointer hover:opacity-85 disabled:opacity-50 transition-opacity"
                  type="button" :disabled="saving || deleting" @click="setPublishNow"
                >Teraz</button>
                <button
                  class="flex-1 h-8 rounded-xl bg-secondary-btn text-muted text-xs font-medium border-0 cursor-pointer hover:opacity-85 disabled:opacity-50 transition-opacity"
                  type="button" :disabled="saving || deleting || !form.published_at" @click="form.published_at = ''"
                >Ako koncept</button>
              </div>
              <button
                v-if="selectedStatus === 'published' && !selectedPost?.is_hidden"
                class="w-full h-8 rounded-xl bg-secondary-btn text-muted text-xs font-medium border-0 cursor-pointer hover:opacity-85 disabled:opacity-50 transition-opacity"
                type="button" :disabled="saving || deleting" @click="hidePublished"
              >Skryť článok</button>
              <button
                v-if="selectedStatus === 'hidden'"
                class="w-full h-8 rounded-xl bg-secondary-btn text-muted text-xs font-medium border-0 cursor-pointer hover:opacity-85 disabled:opacity-50 transition-opacity"
                type="button" :disabled="saving || deleting" @click="unhidePublished"
              >Zobraziť článok</button>
            </section>

            <section class="p-4 border-b border-white/5 flex flex-col gap-3">
              <h3 class="m-0 text-xs font-semibold uppercase tracking-widest text-muted">Titulný obrázok</h3>
              <input
                ref="coverInputEl"
                type="file"
                accept="image/*"
                class="cover-file-input"
                @change="onCoverChange"
              />
              <div class="flex items-center gap-2 bg-hover rounded-xl px-3 py-2">
                <button
                  type="button"
                  class="h-7 px-3 rounded-xl bg-secondary-btn text-muted text-xs font-medium border-0 cursor-pointer hover:opacity-85 flex-shrink-0 transition-opacity"
                  @click="openCoverPicker"
                >Vybrať súbor</button>
                <span class="text-muted text-xs truncate">{{ coverInputLabel }}</span>
              </div>
              <p class="m-0 text-muted text-xs">
                <template v-if="coverFile">{{ coverFile.name }}</template>
                <template v-else-if="coverPreview">Používa sa uložený obrázok.</template>
                <template v-else>Žiadny obrázok.</template>
              </p>
              <div v-if="coverPreview" class="rounded-xl overflow-hidden">
                <img :src="coverPreview" alt="Cover" class="w-full max-h-32 object-cover block" />
              </div>
            </section>

            <section class="p-4 border-b border-white/5 flex flex-col gap-3">
              <h3 class="m-0 text-xs font-semibold uppercase tracking-widest text-muted">Kontrolný zoznam</h3>
              <div class="flex flex-wrap gap-1.5">
                <span
                  v-for="item in publishChecklist"
                  :key="`chk-${item.key}`"
                  class="inline-flex items-center h-6 px-2.5 rounded-full text-xs font-medium"
                  :class="item.done ? 'bg-green-500/10 text-green-400' : item.required ? 'bg-danger/10 text-danger' : 'bg-white/5 text-muted'"
                >{{ item.done ? '✓' : '✗' }} {{ item.label }}</span>
              </div>
            </section>

            <section class="mt-auto p-4">
              <button
                v-if="isEditing"
                class="w-full h-9 rounded-xl bg-danger text-white text-sm font-semibold border-0 cursor-pointer hover:opacity-85 disabled:opacity-50 transition-opacity"
                type="button"
                :disabled="saving || deleting"
                @click="remove"
              >{{ deleting ? 'Mažem…' : 'Vymazať článok' }}</button>
            </section>

          </aside>
        </div>
      </template>
    </div>

  </div>
</div>
