
  <section class="learnPage">
    <header class="hero">
      <p class="hero__eyebrow">Články</p>
      <h1 class="hero__title">Nočná obloha</h1>
      <p class="hero__text">
        Praktické témy, krátke vysvetlenia a čitateľný obsah bez balastu.
      </p>
    </header>

    <section class="panel">
      <form class="search" @submit.prevent="applySearch">
        <input
          v-model="searchInput"
          type="text"
          placeholder="Hľadať tému alebo kľúčové slovo"
          aria-label="Hľadať v článkoch"
        />
        <button type="submit">Hľadať</button>
      </form>

      <div v-if="tags.length" class="tags">
        <button
          class="tag"
          :class="{ 'is-active': !selectedTag }"
          type="button"
          @click="selectTag('')"
        >
          Všetko
        </button>
        <button
          v-for="tag in tags"
          :key="tag.id"
          class="tag"
          :class="{ 'is-active': selectedTag === tag.slug }"
          type="button"
          :aria-pressed="selectedTag === tag.slug ? 'true' : 'false'"
          @click="selectTag(tag.slug)"
        >
          {{ tag.name }}
        </button>
      </div>

      <div v-if="!loading && data" class="resultBar">
        <p>{{ resultLabel }}</p>
        <button
          v-if="selectedTag || search"
          type="button"
          class="clearBtn"
          @click="clearSearch"
        >
          Zrušiť filtre
        </button>
      </div>

      <div v-if="error" class="state state--error">{{ error }}</div>

      <div v-if="loading" class="loadingSkeleton">
        <div class="skeletonFeatured">
          <div class="skeletonThumbLg skeleton"></div>
          <div class="skeletonBody">
            <div class="skeleton skeletonLine skeletonLine--xs"></div>
            <div class="skeleton skeletonLine skeletonLine--lg"></div>
            <div class="skeleton skeletonLine skeletonLine--md"></div>
            <div class="skeleton skeletonLine skeletonLine--sm"></div>
          </div>
        </div>
        <div class="skeletonList">
          <div v-for="row in 4" :key="`sk-${row}`" class="skeletonItem">
            <div class="skeletonThumbSm skeleton"></div>
            <div class="skeletonBody">
              <div class="skeleton skeletonLine skeletonLine--md"></div>
              <div class="skeleton skeletonLine skeletonLine--sm"></div>
            </div>
          </div>
        </div>
      </div>

      <template v-else>
        <article v-if="featuredPost" class="featured">
          <router-link class="featured__media" :to="postLink(featuredPost)">
            <img
              v-if="featuredPost.cover_image_url"
              :src="featuredPost.cover_image_url"
              :alt="featuredPost.title"
              loading="lazy"
            />
            <span v-else>Odporúčaný článok</span>
          </router-link>
          <div class="featured__body">
            <p class="featured__label">Odporúčané</p>
            <h2>
              <router-link :to="postLink(featuredPost)">{{ featuredPost.title }}</router-link>
            </h2>
            <p class="featured__excerpt" v-html="highlight(excerpt(featuredPost.content, 220))"></p>
            <p class="featured__meta">
              {{ formatDate(featuredPost.published_at) }} ·
              {{ featuredPost.user?.name || 'Redakcia' }} ·
              {{ readTime(featuredPost.content) }}
            </p>
            <router-link class="featured__cta" :to="postLink(featuredPost)">Čítať článok &rarr;</router-link>
          </div>
        </article>

        <div v-if="listPosts.length" class="postList">
          <article v-for="post in listPosts" :key="post.id" class="postItem" role="link" tabindex="0" @click="$router.push(postLink(post))" @keydown.enter="$router.push(postLink(post))">
            <router-link v-if="post.cover_image_url" class="postItem__thumb" :to="postLink(post)">
              <img :src="post.cover_image_url" :alt="post.title" loading="lazy" />
            </router-link>
            <div class="postItem__body">
              <h3>
                <router-link :to="postLink(post)">{{ post.title }}</router-link>
              </h3>
              <p class="postItem__excerpt" v-html="highlight(excerpt(post.content, 170))"></p>
              <div class="postItem__meta">
                <span>{{ formatDate(post.published_at) }}</span>
                <span>·</span>
                <span>{{ readTime(post.content) }}</span>
              </div>
            </div>
            <router-link class="postItem__open" :to="postLink(post)">Čítať</router-link>
          </article>
        </div>

        <div v-if="!hasAnyPosts" class="state">
          <p class="state__title">Zatiaľ bez výsledkov</p>
          <p class="state__text">Skús iný výraz alebo zruš filter tagu.</p>
        </div>
      </template>

      <div v-if="data && data.last_page > 1" class="pager">
        <p>Strana {{ data.current_page }} z {{ data.last_page }}</p>
        <div class="pager__actions">
          <button type="button" :disabled="loading || page <= 1" @click="prevPage">&larr; Predošlá</button>
          <button
            type="button"
            :disabled="loading || page >= data.last_page"
            @click="nextPage"
          >
            Ďalšia &rarr;
          </button>
        </div>
      </div>
    </section>
  </section>
