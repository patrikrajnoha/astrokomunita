  <div class="page">
    <header class="topbar">
      <button class="iconBtn" @click="goHome">&larr;</button>
      <div class="topmeta">
        <div class="topname">{{ displayName }}</div>
        <div class="topsmall">{{ auth.user ? `${stats.posts} príspevkov` : `@${handle}` }}</div>
      </div>
    </header>

    <AsyncState
      v-if="!auth.initialized"
      mode="loading"
      title="Načítavam profil"
      loading-style="skeleton"
      :skeleton-rows="4"
      compact
    />

    <template v-else>
      <AsyncState
        v-if="!auth.user"
        mode="empty"
        title="Profil je dostupný po prihlásení"
        message="Prihlás sa a uvidíš svoje príspevky, pozorovania, médiá a záložky."
        action-label="Prihlásiť sa"
        compact
        @action="goLogin"
      />

      <section v-if="auth.user" class="profileShell">
        <div class="cover" :class="{ uploading: coverUploading }">
          <img
            v-if="coverSrc && !coverLoadFailed"
            class="coverImg"
            :src="coverSrc"
            alt="cover"
            @error="onCoverImageError"
          />
          <div class="coverGlow"></div>
          <button
            v-if="auth.user"
            class="mediaBtn coverBtn"
            type="button"
            :disabled="coverUploading"
            @click="openPicker('cover')"
          >
            {{ coverUploading ? 'Nahrávam...' : 'Zmeniť titulnú fotku' }}
          </button>
          <input
            ref="coverInput"
            class="fileInput"
            type="file"
            accept="image/png,image/jpeg,image/webp"
            @change="onMediaChange('cover', $event)"
          />
        </div>

        <div class="profileHead">
          <div
            class="avatar avatarEditable"
            :class="{ uploading: avatarUploading, canEdit: !!auth.user }"
            @click="openAvatarEditor"
          >
            <UserAvatar
              class="avatarImg"
              :user="auth.user"
              :avatar-url="avatarSrc"
              :alt="`${displayName} avatar`"
            />
            <button
              v-if="auth.user"
              type="button"
              class="mediaBtn avatarBtn avatarEditTrigger"
              :disabled="avatarUploading || avatarRemoving"
              aria-label="Upraviť profilový avatar"
              @click.stop="openAvatarEditor"
            >
              <svg class="avatarBtnIcon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M9 4h6l1.2 1.8H19a3 3 0 0 1 3 3v7.2a3 3 0 0 1-3 3H5a3 3 0 0 1-3-3V8.8a3 3 0 0 1 3-3h2.8z"
                />
                <circle cx="12" cy="12.4" r="3.3" />
              </svg>
            </button>
          </div>

          <div class="headActions">
            <button
              v-if="auth.user"
              class="min-h-[34px] px-3.5 rounded-xl bg-secondary-btn text-muted text-[13px] font-semibold border-0 cursor-pointer"
              @click="goToProfileEdit"
            >
              Upraviť profil
            </button>
            <button
              class="min-h-[34px] px-3.5 rounded-xl bg-transparent text-muted text-[13px] font-semibold border-0 cursor-pointer copyBtn"
              @click="copyProfileLink"
            >{{ copyLabel }}</button>
          </div>
        </div>

        <InlineStatus
          v-if="mediaErr"
          variant="error"
          :message="mediaErr"
        />

        <div class="identity">
          <div class="nameRow">
            <h1 class="name">{{ displayName }}</h1>
            <span v-if="auth.user?.is_admin" class="profileBadge">Admin</span>
            <span
              v-if="auth.user?.is_bot || String(auth.user?.role || '').toLowerCase() === 'bot'"
              class="profileBadge profileBadge--bot"
            >
              BOT
            </span>
          </div>

          <div class="handle">@{{ handle }}</div>

          <p v-if="auth.user?.bio" class="bio">{{ auth.user.bio }}</p>
          <p v-else class="bio muted">Zatiaľ bez popisu.</p>
        </div>

        <div class="statsRow" aria-label="Profilové štatistiky">
          <div class="stat">
            <strong>{{ stats.posts }}</strong>
            <span>Príspevky</span>
          </div>
          <div class="stat">
            <strong v-if="tabState.observations.total !== null">{{ tabState.observations.total }}</strong>
            <strong v-else class="ui-skeleton" aria-hidden="true" style="width:2ch;display:inline-block;">&ZeroWidthSpace;</strong>
            <span>Pozorovania</span>
          </div>
          <div class="stat">
            <strong v-if="tabState.events.total !== null">{{ tabState.events.total }}</strong>
            <strong v-else class="ui-skeleton" aria-hidden="true" style="width:2ch;display:inline-block;">&ZeroWidthSpace;</strong>
            <span>Sledované udalosti</span>
          </div>
        </div>

      </section>

      <BaseModal
        v-if="auth.user"
        v-model:open="profileEditModalOpen"
        title="Upraviť profil"
        test-id="profile-edit-modal"
        close-test-id="close-profile-edit-modal"
        compact
      >
        <ProfileEdit embedded />
      </BaseModal>

      <BaseModal
        v-if="auth.user"
        v-model:open="avatarModalOpen"
        title="Upraviť profilový avatar"
        test-id="profile-avatar-modal"
        close-test-id="close-profile-avatar-modal"
      >
        <template #description>
          <p class="avatarCardSub avatarModalSub">Vyber si fotku alebo personalizovaný avatar.</p>
        </template>

        <div class="avatarEditorBody">
          <template v-if="isBotAvatarUser">
            <div class="avatarPreviewWrap">
              <div class="avatar avatarPreviewAvatar">
                <UserAvatar
                  class="avatarImg"
                  :user="auth.user"
                  :size="112"
                  :avatar-url="avatarSrc"
                  :alt="`${displayName} avatar`"
                />
              </div>
              <p class="avatarHint">Bot avatar je viazaný na predpripravené bot assets.</p>
            </div>

            <InlineStatus v-if="avatarErr" variant="error" :message="avatarErr" class="avatarMsg" />

            <div class="avatarPicker">
              <div class="avatarPickerLabel">Bot avatar</div>
              <div class="avatarIconGrid">
                <button
                  v-for="option in botAvatarOptions"
                  :key="option.file"
                  type="button"
                  class="avatarChoice iconChoice"
                  :class="{ active: selectedBotAvatarFile === option.file }"
                  @click="selectBotAvatar(option.file)"
                >
                  <img class="choiceAvatar choiceAvatarImage" :src="option.url" :alt="option.file" />
                  <span class="choiceLabel">{{ option.file }}</span>
                </button>
              </div>
            </div>
          </template>

          <template v-else>
            <div class="avatarModeSwitch" role="tablist" aria-label="Režim profilového avatara">
              <button
                type="button"
                class="modeBtn"
                :class="{ active: avatarDraft.mode === 'image' }"
                @click="setAvatarMode('image')"
              >
                Fotka
              </button>
              <button
                type="button"
                class="modeBtn"
                :class="{ active: avatarDraft.mode === 'generated' }"
                @click="setAvatarMode('generated')"
              >
                Avatar
              </button>
            </div>

            <div class="avatarPreviewWrap">
              <div class="avatar avatarPreviewAvatar">
                <UserAvatar
                  class="avatarImg"
                  :user="auth.user"
                  :size="112"
                  :avatar-url="avatarSrc"
                  :mode="avatarDraft.mode"
                  :prefer-image="avatarDraft.mode === 'image'"
                  :color-index="avatarDraft.color"
                  :icon-index="avatarDraft.icon"
                  :seed="avatarDraft.seed"
                  :alt="`${displayName} avatar`"
                />
              </div>
              <p class="avatarHint">Pri móde Fotka bez obrázka ostáva fallback avatar.</p>
            </div>

            <InlineStatus v-if="avatarErr" variant="error" :message="avatarErr" class="avatarMsg" />

            <template v-if="avatarDraft.mode === 'image'">
              <div class="avatarImageActions">
                <button
                  type="button"
                  class="min-h-[34px] px-3.5 rounded-xl bg-secondary-btn text-muted text-[13px] font-semibold border-0 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
                  :disabled="avatarUploading || avatarRemoving"
                  @click="openPicker('avatar')"
                >
                  {{ avatarUploading ? 'Nahrávam...' : 'Nahrať fotku' }}
                </button>
                <button
                  type="button"
                  class="min-h-[34px] px-3.5 rounded-xl bg-transparent text-muted text-[13px] font-semibold border-0 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
                  :disabled="avatarUploading || avatarRemoving"
                  @click="removeAvatarImage"
                >
                  {{ avatarRemoving ? 'Odstraňujem...' : 'Odstrániť fotku' }}
                </button>
                <input
                  ref="avatarInput"
                  class="fileInput"
                  type="file"
                  accept="image/png,image/jpeg,image/webp"
                  @change="onMediaChange('avatar', $event)"
                />
              </div>
              <p class="avatarHint">Odporúčaná veľkosť: aspoň 512×512 px, JPG/PNG/WebP, max 3 MB.</p>
            </template>

            <template v-else>
              <div class="avatarPicker">
                <div class="avatarPickerLabel">Symbol</div>
                <div class="avatarIconGrid">
                  <button
                    v-for="option in iconOptions"
                    :key="option.index"
                    type="button"
                    class="avatarChoice iconChoice"
                    :class="{ active: avatarResolved.iconIndex === option.index }"
                    @click="selectAvatarIcon(option.index)"
                  >
                    <DefaultAvatar
                      class="choiceAvatar"
                      :size="40"
                      :color-index="avatarResolved.colorIndex"
                      :icon-index="option.index"
                    />
                    <span class="choiceLabel">{{ option.label }}</span>
                  </button>
                </div>
              </div>

              <div class="avatarPicker">
                <div class="avatarPickerLabel">Farba</div>
                <div class="avatarColorGrid">
                  <button
                    v-for="(color, index) in AVATAR_COLORS"
                    :key="color"
                    type="button"
                    class="avatarChoice colorChoice"
                    :class="{ active: avatarResolved.colorIndex === index }"
                    :style="{ '--avatar-choice-color': color }"
                    @click="selectAvatarColor(index)"
                  >
                    <span class="colorSwatch" aria-hidden="true"></span>
                    <span class="choiceLabel">Farba {{ index + 1 }}</span>
                  </button>
                </div>
              </div>

              <div class="avatarActionRow">
                <button
                  type="button"
                  class="min-h-[34px] px-3.5 rounded-xl bg-secondary-btn text-muted text-[13px] font-semibold border-0 cursor-pointer disabled:opacity-50"
                  :disabled="avatarSaving"
                  @click="randomizeAvatar"
                >
                  Náhodne
                </button>
                <button
                  type="button"
                  class="min-h-[34px] px-3.5 rounded-xl bg-transparent text-muted text-[13px] font-semibold border-0 cursor-pointer disabled:opacity-50"
                  :disabled="avatarSaving"
                  @click="resetGeneratedAvatar"
                >
                  Resetovať
                </button>
              </div>
            </template>
          </template>

          <div class="avatarActionRow avatarActionRowSave">
            <button
              type="button"
              class="min-h-[34px] px-3.5 rounded-xl bg-transparent text-muted text-[13px] font-semibold border-0 cursor-pointer disabled:opacity-50"
              :disabled="avatarSaving"
              @click="avatarModalOpen = false"
            >
              Zavrieť
            </button>
            <button
              type="button"
              class="min-h-[34px] px-3.5 rounded-xl bg-vivid text-white text-[13px] font-semibold border-0 cursor-pointer disabled:opacity-50"
              :disabled="avatarSaving"
              @click="saveAvatarPreferences"
            >
              {{ avatarSaving ? 'Ukladám...' : 'Uložiť' }}
            </button>
          </div>
        </div>
      </BaseModal>

      <section v-if="pinnedPost" class="card pinCard">
        <div class="pinHeader">
          <div class="pinTitle">Pripnutý príspevok</div>
          <button
            class="min-h-[34px] px-3.5 rounded-xl bg-transparent text-muted text-[13px] font-semibold border-0 cursor-pointer disabled:opacity-50"
            :disabled="pinLoadingId === pinnedPost.id"
            @click="togglePin(pinnedPost)"
          >
            {{ pinLoadingId === pinnedPost.id ? 'Odopínam...' : 'Odopnúť' }}
          </button>
        </div>
        <div class="pinBody">
          <ObservationCard
            v-if="observationForPost(pinnedPost)"
            :observation="observationForPost(pinnedPost)"
            :clickable="true"
            :show-author="false"
            @open="openObservation"
          />
          <div v-else class="pinContent">{{ pinnedPost.content }}</div>
          <div v-if="!observationForPost(pinnedPost) && pinnedPost.attachment_url" class="attachment">
            <img
              v-if="isImage(pinnedPost)"
              class="attachmentImg"
              :src="attachmentSrc(pinnedPost)"
              alt="attachment"
            />
            <a v-else class="attachmentFile" :href="attachmentSrc(pinnedPost)" target="_blank" rel="noreferrer">
              {{ pinnedPost.attachment_original_name || 'Príloha' }}
            </a>
          </div>
        </div>
      </section>


      <section v-if="auth.user" class="feedShell">
        <div class="tabs">
          <button
            v-for="t in tabs"
            :key="t.key"
            class="tab"
            :class="{ active: activeTab === t.key }"
            @click="setActiveTab(t.key)"
          >
            <span class="tabLabel">{{ t.label }}</span>
            <span v-if="t.key === 'observations' && tabState.observations.total !== null" class="tabCount">
              {{ tabState.observations.total }}
            </span>
          </button>
        </div>

        <InlineStatus v-if="actionMsg" variant="success" :message="actionMsg" />
        <InlineStatus v-if="actionErr" variant="error" :message="actionErr" />

        <InlineStatus
          v-if="tabState[activeTab].err"
          variant="error"
          :message="tabState[activeTab].err"
          action-label="Skúsiť znova"
          @action="loadTab(activeTab, true)"
        />

        <AsyncState
          v-if="shouldShowLoadingState"
          mode="loading"
          title="Načítavam obsah"
          loading-style="skeleton"
          :skeleton-rows="4"
          compact
        />

        <AsyncState
          v-else-if="shouldShowEmptyState"
          mode="empty"
          :title="globalEmptyTitle"
          :message="globalEmptyMessage"
          :action-label="globalEmptyActionLabel"
          compact
          @action="onGlobalEmptyAction"
        />

        <Transition v-else name="profileTab" mode="out-in">
          <div :key="activeTab">
          <div v-if="activeTab === 'observations'" class="observationsList">
            <ObservationCard
              v-for="item in tabState.observations.items"
              :key="item.id"
              :observation="item"
              :clickable="true"
              :show-author="false"
              @open="openObservation"
            />
          </div>

          <div v-else-if="activeTab === 'events'">
            <div class="eventSegments" role="tablist" aria-label="Filter udalostí">
              <button
                v-for="segment in eventSegments"
                :key="segment.key"
                type="button"
                class="eventSegment"
                :class="{ active: activeEventSegment === segment.key }"
                role="tab"
                :aria-selected="activeEventSegment === segment.key ? 'true' : 'false'"
                @click="activeEventSegment = segment.key"
              >
                <span>{{ segment.label }}</span>
                <span class="eventSegment__count">{{ eventSegmentCounts[segment.key] || 0 }}</span>
              </button>
            </div>

            <AsyncState
              v-if="activeEventItems.length === 0"
              mode="empty"
              :title="eventSegmentEmptyTitle"
              :message="eventSegmentEmptyMessage"
              compact
            />

            <div v-else class="eventGrid">
              <ProfileEventCard
                v-for="eventItem in activeEventItems"
                :key="eventItem.id"
                :event="eventItem"
                @open="openFollowedEvent"
              />
            </div>
          </div>

          <div v-else class="postList">
            <article
              v-for="p in tabState[activeTab].items"
              :key="p.id"
              class="postItem postItem--clickable"
              :class="{ pinned: isPinnedOnProfile(p) }"
              role="button"
              tabindex="0"
              @click="openPost(p, $event)"
              @keydown.enter.prevent="openPost(p, $event)"
              @keydown.space.prevent="openPost(p, $event)"
            >
              <div class="avatar sm">
                <UserAvatar
                  class="avatarImg"
                  :user="profilePostAuthor(p)"
                  :alt="`${profilePostAuthorName(p)} avatar`"
                />
              </div>

              <div class="postBody">
                <div class="postMeta">
                  <div class="postName">{{ profilePostAuthorName(p) }}</div>
                  <div class="dot">&middot;</div>
                  <div class="postTime">{{ formatPostTimestamp(p) }}</div>
                </div>

                <div v-if="p.parent && activeTab === 'replies'" class="replyContext">
                  Odpoveď na: <span class="replyAuthor">@{{ parentHandle(p) }}</span>
                  <span class="replyText">{{ shorten(p.parent.content) }}</span>
                </div>

                <div v-if="observationForPost(p)" @click.stop>
                  <ObservationCard
                    :observation="observationForPost(p)"
                    :clickable="true"
                    :show-author="false"
                    @open="openObservation"
                  />
                </div>
                <HashtagText v-else class="postContent" :content="p.content" />

                <SharedPostPreview
                  v-if="!observationForPost(p)"
                  :post="p"
                  :is-authed="Boolean(auth.user)"
                  @login-required="onPollLoginRequired"
                />

                <div v-if="!observationForPost(p) && p.poll" @click.stop>
                  <PollCard
                    :poll="p.poll"
                    :post-id="p.id"
                    :is-authed="Boolean(auth.user)"
                    @updated="(nextPoll) => updatePostPoll(p, nextPoll)"
                    @login-required="onPollLoginRequired"
                  />
                </div>

                <div v-if="!observationForPost(p) && attachedEventForPost(p)" class="attachedEventCard" @click.stop>
                  <div class="attachedEventCopy">
                    <p class="attachedEventTitle">{{ attachedEventForPost(p).title || 'Udalosť' }}</p>
                    <p class="attachedEventDate">
                      {{ formatEventRange(attachedEventForPost(p).start_at, attachedEventForPost(p).end_at) }}
                    </p>
                  </div>
                  <button
                    type="button"
                    class="min-h-[32px] px-3 rounded-xl bg-secondary-btn text-muted text-[12px] font-semibold border-0 cursor-pointer whitespace-nowrap"
                    @click="openAttachedEvent(p)"
                  >
                    Otvoriť udalosť
                  </button>
                </div>

                <div v-if="!observationForPost(p) && postGifUrl(p)" class="attachment" @click.stop>
                  <img class="attachmentImg" :src="postGifUrl(p)" :alt="postGifTitle(p)" />
                </div>

                <div v-if="!observationForPost(p) && p.attachment_url" class="attachment" @click.stop>
                  <img
                    v-if="isImage(p)"
                    class="attachmentImg"
                    :src="attachmentSrc(p)"
                    alt="attachment"
                  />
                  <a v-else class="attachmentFile" :href="attachmentSrc(p)" target="_blank" rel="noreferrer">
                    {{ p.attachment_original_name || 'Príloha' }}
                  </a>
                </div>

                <div class="postActions" @click.stop>
                  <button
                    class="postActionIconBtn"
                    type="button"
                    title="Zobraziť vlákno"
                    aria-label="Zobraziť vlákno"
                    @click.stop="openPost(p)"
                  >
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M21 11.5a8.5 8.5 0 0 1-8.5 8.5 8.3 8.3 0 0 1-3.6-.8L3 21l1.8-5.8a8.3 8.3 0 0 1-.8-3.7A8.5 8.5 0 0 1 12.5 3h.5A8.5 8.5 0 0 1 21 11.5z" />
                    </svg>
                    <span class="postActionLabel">Zobraziť vlákno</span>
                  </button>
                  <div class="postActionsMore" @click.stop>
                    <DropdownMenu
                      :items="profilePostMenuItems(p)"
                      label="Ďalšie akcie"
                      menu-label="Akcie príspevku"
                      @select="(item) => onProfilePostMenuSelect(item, p)"
                    >
                      <template #trigger>
                        <svg class="postActionDotsIcon" viewBox="0 0 24 24" aria-hidden="true">
                          <circle cx="6.5" cy="12" r="1.6" />
                          <circle cx="12" cy="12" r="1.6" />
                          <circle cx="17.5" cy="12" r="1.6" />
                        </svg>
                      </template>
                    </DropdownMenu>
                  </div>
                </div>
              </div>
            </article>
          </div>
          </div>
        </Transition>

        <div class="loadMore">
          <button
            v-if="tabState[activeTab].next"
            class="min-h-[34px] px-4 rounded-xl bg-secondary-btn text-muted text-[13px] font-semibold border-0 cursor-pointer disabled:opacity-50"
            :disabled="tabState[activeTab].loading"
            @click="loadTab(activeTab, false)"
          >
            {{ tabState[activeTab].loading ? 'Načítavam...' : 'Načítať viac' }}
          </button>
        </div>
      </section>
    </template>
  </div>
