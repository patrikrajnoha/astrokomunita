
  <div class="page">
    <header class="topbar">
      <button class="iconBtn" @click="goHome">&larr;</button>
      <div class="topmeta">
        <div class="topname">{{ displayName }}</div>
        <div class="topsmall">@{{ handle }}</div>
      </div>
    </header>

    <AsyncState
      v-if="loading"
      mode="loading"
      title="Načítavam profil"
      loading-style="skeleton"
      :skeleton-rows="4"
      compact
    />
    <InlineStatus
      v-else-if="err"
      variant="error"
      :message="err"
      action-label="Skúsiť znova"
      @action="refreshProfile"
    />

    <template v-else>
      <section class="profileShell ui-profile-shell">
        <div
          class="cover"
          data-testid="public-profile-cover"
          :class="{ 'cover--bot-fallback': coverMedia.isBotFallback }"
          :style="coverMedia.fallbackStyle"
        >
          <img v-if="coverMedia.hasImage" class="coverImg" :src="coverMedia.imageUrl" alt="cover" />
          <div class="coverGlow"></div>
        </div>

        <div class="profileHead">
          <div class="avatar">
            <UserAvatar class="avatarImg" :user="avatarUser" :alt="displayName" />
          </div>

          <div class="headActions">
            <button type="button" class="ui-btn ui-btn--ghost shareProfileBtn" aria-label="Zdieľať profil" @click="copyProfileLink">
              <svg class="shareProfileBtn__icon" viewBox="0 0 24 24" fill="none" width="16" height="16" aria-hidden="true">
                <path d="M15 8l-6 3.5L15 15M20 7a2 2 0 1 1-4 0 2 2 0 0 1 4 0ZM10 12a2 2 0 1 1-4 0 2 2 0 0 1 4 0Zm10 5a2 2 0 1 1-4 0 2 2 0 0 1 4 0Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span class="shareProfileBtn__label">{{ copyLabel }}</span>
            </button>
          </div>
        </div>

        <div class="identity ui-profile-header ui-profile-identity">
          <div class="nameRow">
            <h1 class="name">{{ displayName }}</h1>
            <span v-if="user?.is_admin" class="badge">Admin</span>
            <span v-if="user?.is_bot || String(user?.role || '').toLowerCase() === 'bot'" class="badge badgeBot">
              BOT
            </span>
          </div>

          <div class="handle">@{{ handle }}</div>

          <p v-if="user?.bio" class="bio">{{ user.bio }}</p>
          <p v-else class="bio muted">Zatiaľ bez popisu.</p>

        </div>

        <div class="statsRow ui-profile-stats">
          <div class="stat ui-profile-stat">
            <strong>{{ stats.posts }}</strong>
            <span>Príspevky</span>
          </div>
          <div class="stat ui-profile-stat">
            <strong>{{ stats.replies }}</strong>
            <span>Odpovede</span>
          </div>
          <div class="stat ui-profile-stat">
            <strong>{{ stats.media }}</strong>
            <span>Médiá</span>
          </div>
        </div>
      </section>

      <section class="feedShell">
        <div class="tabs">
          <button
            v-for="t in tabs"
            :key="t.key"
            class="tab"
            :class="{ active: activeTab === t.key }"
            @click="setActiveTab(t.key)"
          >
            {{ t.label }}
            <span v-if="tabState[t.key].total !== null" class="tabCount">{{ tabState[t.key].total }}</span>
          </button>
        </div>

        <InlineStatus
          v-if="tabState[activeTab].err"
          variant="error"
          :message="tabState[activeTab].err"
          action-label="Skúsiť znova"
          @action="loadTab(activeTab, true)"
        />

        <AsyncState
          v-if="tabState[activeTab].loading && tabState[activeTab].items.length === 0"
          mode="loading"
          title="Načítavam obsah"
          loading-style="skeleton"
          :skeleton-rows="4"
          compact
        />

        <AsyncState
          v-else-if="!tabState[activeTab].loading && tabState[activeTab].items.length === 0"
          mode="empty"
          :title="activeTab === 'observations' ? 'Zatiaľ žiadne pozorovania' : 'Zatiaľ žiadny obsah'"
          :message="activeTab === 'observations' ? 'Používateľ ešte nepridal pozorovanie.' : 'Tento feed je momentálne prázdny.'"
          compact
        />

        <div v-else-if="activeTab === 'observations'" class="observationsList">
          <ObservationCard
            v-for="item in tabState.observations.items"
            :key="item.id"
            :observation="item"
            :clickable="true"
            :show-author="false"
            @open="openObservation"
          />
        </div>

        <div v-else class="postList ui-stream">
          <article
            v-for="p in tabState[activeTab].items"
            :key="p.id"
            class="postItem postItem--clickable ui-stream-item"
            role="button"
            tabindex="0"
            @click="openPost(p)"
            @keydown.enter.prevent="openPost(p)"
            @keydown.space.prevent="openPost(p)"
          >
            <div class="avatar sm">
              <UserAvatar class="avatarImg" :user="avatarUser" :alt="displayName" />
            </div>

            <div class="postBody">
              <div class="postMeta ui-stream-item__meta">
                <div class="postName">{{ displayName }}</div>
                <div class="dot">&middot;</div>
                <div class="postTime">{{ fmt(p.created_at) }}</div>
              </div>

              <div v-if="p.parent && activeTab === 'replies'" class="replyContext">
                Odpoveď na: <span class="replyAuthor">@{{ parentHandle(p) }}</span>
                <span class="replyText">{{ shorten(p.parent.content) }}</span>
              </div>

              <div v-if="observationForPost(p)" @click.stop>
                <ObservationCard
                  :observation="observationForPost(p)"
                  :clickable="true"
                  :show-author="false"
                  @open="openObservation"
                />
              </div>
              <HashtagText v-else class="postContent ui-stream-item__body" :content="p.content" />

              <SharedPostPreview
                v-if="!observationForPost(p)"
                :post="p"
                :is-authed="Boolean(auth.user)"
                @login-required="onPollLoginRequired"
              />

              <div v-if="!observationForPost(p) && p.poll" @click.stop>
                <PollCard
                  :poll="p.poll"
                  :post-id="p.id"
                  :is-authed="Boolean(auth.user)"
                  @updated="(nextPoll) => updatePostPoll(p, nextPoll)"
                  @login-required="onPollLoginRequired"
                />
              </div>

              <div v-if="!observationForPost(p) && p.attachment_url" class="attachment" @click.stop>
                <img
                  v-if="isImage(p)"
                  class="attachmentImg"
                  :src="attachmentSrc(p)"
                  alt="attachment"
                />
                <a v-else class="attachmentFile" :href="attachmentSrc(p)" target="_blank" rel="noreferrer">
                  {{ p.attachment_original_name || 'Príloha' }}
                </a>
              </div>

              <div class="postActions ui-stream-item__actions" @click.stop>
                <PostActionBar
                  :item="p"
                  :reply-count="Number(p.replies_count ?? 0)"
                  :like-count="Number(p.likes_count ?? 0)"
                  :like-loading="isLikeLoading(p)"
                  :bookmark-loading="isBookmarkLoading(p)"
                  :like-bump="likeBumpId === p.id"
                  :is-authed="isAuthed"
                  :menu-items="menuItemsForPost(p)"
                  @reply="openPost(p)"
                  @like="toggleLike(p)"
                  @bookmark="toggleBookmark(p)"
                  @share="openShareModal(p)"
                  @menu-select="(item) => onPostMenuAction(item, p)"
                />
              </div>
            </div>
          </article>
        </div>

        <div v-if="reportTarget" class="report-modal" @click.self="closeReport">
          <div class="report-content" role="dialog" aria-modal="true" aria-labelledby="report-dialog-title">
            <div class="report-header">
              <h3 class="report-title" id="report-dialog-title">Nahlásiť príspevok</h3>
              <button class="report-close" type="button" aria-label="Zavrieť" @click="closeReport">×</button>
            </div>

            <div class="report-form">
              <label class="form-label" for="report-reason">Dôvod</label>
              <select id="report-reason" v-model="reportReason" class="report-select">
                <option v-for="option in reportOptions" :key="option.value" :value="option.value">
                  {{ option.label }}
                </option>
              </select>

              <label class="form-label" for="report-message">Správa (voliteľná)</label>
              <textarea
                id="report-message"
                v-model="reportMessage"
                class="ui-textarea form-textarea"
                rows="3"
                placeholder="Opíš problém podrobnejšie..."
              ></textarea>

              <div class="report-actions">
                <button class="ui-btn ui-btn--ghost reportBtn" type="button" @click="closeReport">Zrušiť</button>
                <button class="ui-btn ui-btn--primary reportBtn" type="button" @click="submitReport">Nahlásiť</button>
              </div>
            </div>
          </div>
        </div>

        <div class="loadMore">
          <button
            v-if="tabState[activeTab].next"
            class="ui-btn ui-btn--secondary"
            :disabled="tabState[activeTab].loading"
            @click="loadTab(activeTab, false)"
          >
            {{ tabState[activeTab].loading ? 'Načítavam...' : 'Načítať viac' }}
          </button>
        </div>

        <ShareModal v-if="shareTarget" :open="true" :post="shareTarget" @close="closeShareModal" />
      </section>
    </template>
  </div>
