
  <div
    class="min-h-screen overflow-x-hidden bg-[var(--bg-app)] text-[var(--text-primary)] transition-colors duration-700"
    :style="appShellStyle"
  >
    <header
      class="appMobileHeader sticky top-0 z-40 flex items-center justify-between border-b border-[var(--divider-color)] bg-[color:rgb(var(--bg-app-rgb)/0.92)] px-4 backdrop-blur md:hidden"
    >
      <button
        type="button"
        class="appMobileHeader__menuBtn ui-pill ui-pill--secondary ui-pill--icon"
        aria-label="Otvoriť navigáciu"
        @click="openDrawer"
      >
        &#9776;
      </button>

      <RouterLink
        to="/"
        class="appMobileHeader__logoLink inline-flex items-center text-base font-semibold text-[var(--color-surface)]"
        aria-label="Domov"
      >
        <img src="/logo.png" alt="Astrokomunita" class="appMobileHeader__logo object-contain" />
      </RouterLink>

      <span class="h-10 w-10" aria-hidden="true"></span>
    </header>

    <aside
      :class="[
        'fixed inset-y-0 left-0 hidden w-60 flex-col bg-[var(--bg-app)] px-3 py-5 md:left-3 md:inset-y-3 md:rounded-2xl md:flex xl:hidden',
        isHomeFeedRoute ? '' : 'border-r border-[var(--divider-color)]',
      ]"
    >
      <div class="flex h-full flex-col">
        <nav class="flex-1" aria-label="Hlavna navigacia">
          <MainNavbar />
        </nav>
      </div>
    </aside>

    <div
      :class="[
        showMobileBottomNav
          ? 'pb-[calc(var(--mobile-bottom-nav-offset)+env(safe-area-inset-bottom)+1rem)]'
          : 'pb-0',
        'md:pb-0 md:pl-64 xl:pl-0',
      ]"
    >
      <div
        v-if="showAuthFallbackBanner || showAuthBannedBanner"
        class="authFallbackBanner"
        :class="{ 'is-danger': showAuthBannedBanner }"
        role="status"
        aria-live="polite"
      >
        <span>{{ authBannerMessage }}</span>
        <button
          v-if="showAuthFallbackBanner"
          type="button"
          class="authFallbackRetry ui-pill ui-pill--secondary"
          @click="retryAuthFetch"
        >
          Skúsiť znova
        </button>
      </div>

      <div :class="desktopFrameClass" data-testid="desktop-frame">
        <div :class="centerShellClass" :style="centerShellStyle" data-testid="center-shell">
          <aside
            v-if="showDesktopMainSidebar"
            :class="[
              'hidden h-screen overflow-hidden bg-[var(--bg-app)] px-3 py-5 xl:pl-5 2xl:pl-6 xl:sticky xl:top-0 xl:block',
              isHomeFeedRoute ? '' : 'border-r border-[var(--divider-color)]',
            ]"
            data-testid="layout-left"
          >
            <div class="flex h-full flex-col">
              <nav class="flex-1" aria-label="Hlavna navigacia">
                <MainNavbar />
              </nav>
            </div>
          </aside>

          <main
            :class="[
              'min-w-0 overflow-x-hidden',
              isProfileRoute
                ? 'px-0 py-0 md:px-0 md:py-0 xl:px-4 2xl:px-6'
                : isAdminRoute
                  ? 'px-2 py-4 md:px-3 lg:px-4 xl:px-2 2xl:px-3'
                  : isHomeFeedRoute
                    ? 'px-4 pt-2 pb-6 md:px-8 md:pt-2 md:pb-6 xl:px-2 xl:pt-0 xl:pb-4 2xl:px-4 2xl:pt-0 2xl:pb-4'
                    : 'px-4 py-6 md:px-8 xl:px-2 2xl:px-4',
            ]"
            data-testid="layout-center"
          >
            <div :class="mainContentClass">
              <RouterView v-slot="{ Component, route: activeRoute }">
                <transition name="appRoute">
                  <component :is="Component" :key="activeRoute.path" />
                </transition>
              </RouterView>
            </div>
          </main>
        </div>

        <aside
          v-if="showRightSidebar"
          class="hidden xl:col-start-2 xl:block xl:justify-self-end xl:self-start xl:pr-2 2xl:pr-2"
          data-testid="layout-right"
          aria-label="Pravy panel"
        >
          <div
            data-testid="right-rail"
            data-tour="conditions-sidebar"
            :class="[
              'rightRail h-screen overflow-y-auto overflow-x-hidden bg-[var(--bg-app)] xl:sticky xl:top-0',
              'w-[20.5rem] px-3.5 pb-3.5 pt-0',
              'border-l border-[var(--divider-color)]',
            ]"
          >
            <div v-if="isHomeFeedRoute" class="rightRailBaseline" aria-hidden="true"></div>
            <div class="rightRail__inner">
              <div
                class="rightRail__content"
                :class="isAdminRoute ? '' : 'sidebar-dense sidebar-ultra'"
              >
                <AdminSubNav v-if="isAdminRoute" />
                <DynamicSidebar
                  v-else
                  :observing-lat="observingLat"
                  :observing-lon="observingLon"
                  :observing-date="observingDate"
                  :observing-tz="observingTz"
                  :observing-location-name="observingLocationName"
                />
                <div v-if="!auth.isAuthed && !isAdminRoute" class="sidebarGuestAuth" data-testid="sidebar-guest-auth">
                  <RouterLink to="/register" class="ui-pill ui-pill--primary sidebarGuestAuth__btn" aria-label="Vytvoriť účet">
                    Vytvoriť účet
                  </RouterLink>
                  <RouterLink to="/login" class="ui-pill ui-pill--secondary sidebarGuestAuth__btn" aria-label="Prihlásiť sa">
                    Prihlásiť sa
                  </RouterLink>
                </div>
              </div>

              <div class="rightSidebarFooterLinks" data-testid="right-sidebar-legal-links">
                <RouterLink
                  v-for="item in legalLinks"
                  :key="`right-${item.to}`"
                  :to="item.to"
                  class="rightSidebarFooterLinks__item"
                >
                  {{ item.label }}
                </RouterLink>
              </div>
            </div>
          </div>
        </aside>
      </div>
    </div>

    <MobileBottomNav v-if="showMobileBottomNav" />

    <MobileFab
      v-if="
        !isDrawerOpen
          && !isComposerOpen
          && !isWidgetMenuOpen
          && !isWidgetSheetOpen
      "
      :is-authenticated="auth.isAuthed"
      :label="mobileFabLabel"
      :bottom-offset="fabBottomOffset"
      @widgets="openWidgetsMenu"
    />

    <button
      v-if="canInstall"
      type="button"
      class="installBtn ui-pill ui-pill--secondary"
      @click="installApp"
    >Nainštalovať aplikáciu</button>

    <transition
      enter-active-class="transition-opacity duration-200"
      enter-from-class="opacity-0"
      enter-to-class="opacity-100"
      leave-active-class="transition-opacity duration-150"
      leave-from-class="opacity-100"
      leave-to-class="opacity-0"
    >
      <div
        v-if="isDrawerOpen"
        class="fixed inset-0 z-40 bg-[color:rgb(var(--bg-app-rgb)/0.72)] md:hidden"
        aria-hidden="true"
        @click="closeDrawer"
      ></div>
    </transition>

    <transition
      enter-active-class="transition duration-200 ease-out"
      enter-from-class="-translate-x-full opacity-0"
      enter-to-class="translate-x-0 opacity-100"
      leave-active-class="transition duration-150 ease-in"
      leave-from-class="translate-x-0 opacity-100"
      leave-to-class="-translate-x-full opacity-0"
    >
      <aside
        v-if="isDrawerOpen"
        :class="[
          'fixed inset-y-0 left-0 z-50 w-72 overflow-y-auto bg-[var(--bg-app)] px-4 py-6 md:hidden',
          isHomeFeedRoute ? '' : 'border-r border-[var(--divider-color)]',
        ]"
        aria-label="Mobilna navigacia"
      >
        <div class="flex items-center justify-between">
          <RouterLink
            to="/"
            class="inline-flex items-center gap-2 text-base font-semibold text-[var(--text-primary)]"
            aria-label="Domov"
            @click="closeDrawer"
          >
            <img src="/logo.png" alt="Astrokomunita" class="h-8 w-auto max-w-[9rem] object-contain" />
          </RouterLink>

          <button
            type="button"
            class="ui-pill ui-pill--secondary ui-pill--icon"
            aria-label="Zavrieť navigáciu"
            @click="closeDrawer"
          >
            &#10005;
          </button>
        </div>

        <div class="mt-6">
          <MainNavbar :show-brand-logo="false" :show-create-button="false" />
        </div>

        <div v-if="!auth.isAuthed" class="drawerGuestAuth">
          <RouterLink
            to="/register"
            class="drawerGuestAuth__btn drawerGuestAuth__btn--primary"
            @click="closeDrawer"
          >
            Vytvoriť účet
          </RouterLink>
          <RouterLink
            to="/login"
            class="drawerGuestAuth__btn drawerGuestAuth__btn--secondary"
            @click="closeDrawer"
          >
            Prihlásiť sa
          </RouterLink>
        </div>
      </aside>
    </transition>

    <CreatePostModal
      :open="isComposerOpen"
      :initial-action="composerInitialAction"
      :initial-attachment-file="composerInitialAttachmentFile"
      @close="closeComposerModal"
      @created="onPostCreated"
    />

    <transition
      enter-active-class="transition-opacity duration-200"
      enter-from-class="opacity-0"
      enter-to-class="opacity-100"
      leave-active-class="transition-opacity duration-150"
      leave-from-class="opacity-100"
      leave-to-class="opacity-0"
    >
      <div
        v-if="isWidgetMenuOpen || isWidgetSheetOpen"
        class="sheetOverlay"
        aria-hidden="true"
        @click="closeWidgetLayers"
      ></div>
    </transition>

    <transition name="sheetSpring">
      <section
        v-if="isWidgetMenuOpen"
        class="sheetDialog"
        :style="{ transform: `translateY(${widgetMenuOffsetY}px)` }"
        role="dialog"
        aria-modal="true"
        aria-labelledby="mobile-widgets-menu-title"
        @click.stop
      >
        <button
          type="button"
          class="sheetHandle"
          :aria-label="mobileFabMenuCloseLabel"
          @touchstart="onSheetTouchStart($event, 'menu')"
          @touchmove="onSheetTouchMove($event, 'menu')"
          @touchend="onSheetTouchEnd('menu')"
          @click="closeWidgetMenu"
        ></button>
        <div class="sheetHead">
          <h2 id="mobile-widgets-menu-title" class="sheetTitle">{{ mobileFabMenuTitle }}</h2>
          <button
            type="button"
            class="sheetClose ui-pill ui-pill--secondary ui-pill--icon"
            :aria-label="mobileFabMenuCloseLabel"
            @click="closeWidgetMenu"
          >
            &#10005;
          </button>
        </div>

        <div class="sheetList">
          <template v-if="isAdminRoute">
            <div class="sheetAdminNavWrap">
              <AdminSubNav @navigate="closeWidgetMenu" />
            </div>
          </template>
          <template v-else>
            <RouterLink
              v-if="!auth.isAuthed"
              to="/login"
              class="sheetGuestNote"
              @click="closeWidgetMenu"
            >
              <span class="sheetGuestNoteText">Pre ďalšie widgety sa prihlás</span>
              <span class="sheetGuestNoteBtn">Prihlásiť sa →</span>
            </RouterLink>

            <button
              v-if="auth.isAuthed"
              type="button"
              class="sheetAction ui-pill ui-pill--primary createAction"
              @click="openComposerFromWidgets"
            >
              <span class="sheetActionIconWrap">
                <svg class="sheetActionIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 5v14" />
                  <path d="M5 12h14" />
                </svg>
              </span>
              <span class="sheetActionText">Vytvoriť príspevok</span>
            </button>

            <button
              v-if="enabledMobileSections.length > 1"
              type="button"
              class="sheetAction ui-pill ui-pill--secondary"
              @click="openAllWidgetsSheet"
            >
              <span class="sheetActionIconWrap">
                <svg class="sheetActionIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M4 7h16" />
                  <path d="M4 12h16" />
                  <path d="M4 17h16" />
                </svg>
              </span>
              <span class="sheetActionText">Zobraziť všetky</span>
            </button>

            <button
              v-if="lastOpenedWidget"
              type="button"
              class="sheetAction ui-pill ui-pill--secondary"
              @click="openWidgetSheet(lastOpenedWidget)"
            >
              <span class="sheetActionIconWrap">
                <svg
                  class="sheetActionIcon"
                  :viewBox="resolveSidebarIcon(lastOpenedWidget.section_key).viewBox"
                  fill="none"
                  aria-hidden="true"
                >
                  <path
                    v-for="(path, index) in resolveSidebarIcon(lastOpenedWidget.section_key).paths"
                    :key="`last-${index}`"
                    :d="path"
                  />
                </svg>
              </span>
              <span class="sheetActionText">Naposledy: {{ lastOpenedWidget.title }}</span>
            </button>

            <template v-if="enabledMobileSections.length > 0">
              <button
                v-for="section in enabledMobileSections"
                :key="section.section_key"
                type="button"
                class="sheetAction ui-pill ui-pill--secondary"
                @click="openWidgetSheet(section)"
              >
                <span class="sheetActionIconWrap">
                  <svg
                    class="sheetActionIcon"
                    :viewBox="resolveSidebarIcon(section.section_key).viewBox"
                    fill="none"
                    aria-hidden="true"
                  >
                    <path
                      v-for="(path, index) in resolveSidebarIcon(section.section_key).paths"
                      :key="`${section.section_key}-${index}`"
                      :d="path"
                    />
                  </svg>
                </span>
                <span class="sheetActionText">{{ section.title }}</span>
              </button>
            </template>
            <div v-else class="sheetEmpty">Žiadne widgety</div>
          </template>
        </div>
      </section>
    </transition>

    <transition name="sheetSpring">
      <section
        v-if="isWidgetSheetOpen"
        class="sheetDialog"
        :style="{ transform: `translateY(${widgetSheetOffsetY}px)` }"
        role="dialog"
        aria-modal="true"
        aria-labelledby="mobile-widget-title"
        @click.stop
      >
        <button
          type="button"
          class="sheetHandle"
          aria-label="Zavrieť widget"
          @touchstart="onSheetTouchStart($event, 'content')"
          @touchmove="onSheetTouchMove($event, 'content')"
          @touchend="onSheetTouchEnd('content')"
          @click="closeWidgetSheet"
        ></button>
        <div class="sheetHead">
          <h2 id="mobile-widget-title" class="sheetTitle">{{ activeWidgetTitle }}</h2>
          <button
            type="button"
            class="sheetClose ui-pill ui-pill--secondary ui-pill--icon"
            aria-label="Zavrieť widget"
            @click="closeWidgetSheet"
          >
            &#10005;
          </button>
        </div>

        <div class="sheetBody">
          <template v-if="showAllWidgets">
            <div class="sheetWidgetList">
              <component
                :is="resolveSidebarComponent(section.section_key)"
                v-for="section in enabledMobileSections"
                :key="`sheet-${section.section_key}`"
                v-bind="propsForWidget(section.section_key, section.title)"
              />
            </div>
          </template>
          <template v-else-if="activeWidgetComponent">
            <component
              :is="activeWidgetComponent"
              v-bind="propsForWidget(activeWidgetKey, activeWidgetTitle)"
            />
          </template>
          <div v-else class="sheetEmpty">Widget nie je dostupny.</div>
        </div>
      </section>
    </transition>

    <MarkYourCalendarModal
      v-if="isCalendarPopupVisible && !isOnboardingFlowActive"
      :items="calendarPopupPayload?.items || []"
      :bundle-ics-url="calendarPopupPayload?.calendar?.bundle_ics_url || ''"
      @close="closeCalendarPopup"
      @go-calendar="goToCalendarFromPopup"
    />

    <OnboardingTour
      v-if="onboardingTour.isOpen && !isCalendarPopupVisible && !isOnboardingFlowActive"
    />
  </div>
