
  <div v-if="open" class="inviteModalRoot" @click.self="close">
    <section class="inviteModalCard" role="dialog" aria-modal="true" aria-labelledby="invite-ticket-title">
      <header class="modalHead">
        <div>
          <h2 id="invite-ticket-title">Pozvánka</h2>
          <p>Pošli personalizovanú pozvánku na astronomické podujatie.</p>
        </div>
        <button type="button" class="closeBtn" aria-label="Zavrieť" @click="close">×</button>
      </header>

      <div class="modalBody">
        <section class="formPanel">
          <label class="field">
            <span>Meno pozorovateľa</span>
            <input
              v-model.trim="attendeeName"
              type="text"
              maxlength="80"
              placeholder="Napr. Zdenka Stellar"
              data-testid="attendee-name-input"
              @blur="attendeeNameTouched = true"
            />
          </label>
          <p v-if="attendeeNameError" class="fieldError">{{ attendeeNameError }}</p>

          <button
            type="button"
            class="optionalToggle"
            :aria-expanded="String(showOptionalFields)"
            @click="showOptionalFields = !showOptionalFields"
          >
            {{ showOptionalFields ? 'Skryť voliteľné polia' : 'Pridať e-mail a správu' }}
          </button>

          <div v-if="showOptionalFields" class="optionalFields">
            <label class="field">
              <span>E-mail pozvaného (voliteľne)</span>
              <input v-model.trim="inviteeEmail" type="email" placeholder="meno@email.com" />
            </label>

            <label class="field">
              <span>Správa (voliteľne)</span>
              <textarea v-model.trim="message" rows="3" maxlength="240" placeholder="Krátky odkaz k pozvánke" />
            </label>
          </div>

          <p v-if="submitError" class="fieldError">{{ submitError }}</p>

          <div v-if="submitSuccess" class="successBanner" role="status">
            <span class="successBanner__icon" aria-hidden="true">✓</span>
            <span>{{ submitSuccess }}</span>
          </div>

          <div class="actionsPrimary">
            <button
              type="button"
              class="primaryBtn"
              :disabled="isSubmitDisabled"
              data-testid="send-invite-btn"
              @click="submitInvite"
            >
              {{ sending ? 'Odosielam...' : 'Odoslať pozvánku' }}
            </button>
          </div>

          <div class="actionsSecondary">
            <button type="button" class="tertiaryBtn" data-testid="share-ticket-btn" @click="shareTicket">
              Zdieľať
            </button>
            <button type="button" class="tertiaryBtn" data-testid="print-ticket-btn" @click="printTicket">
              Vytlačiť vstupenku
            </button>
          </div>
        </section>

        <div class="ticketPrintRoot">
          <article class="ticketPreview">
            <div class="ticketHeader" aria-hidden="true">
              <span class="ticketBrand">✦ Astrokomunita</span>
              <span class="ticketHeaderIcon">🌙</span>
            </div>

            <div class="ticketBody">
              <p class="ticketKicker">Vstupenka do nebeského divadla</p>
              <h3 class="ticketTitle">{{ eventTitle }}</h3>
              <p class="ticketMeta">{{ eventDateTime }}</p>
              <p v-if="eventPlace" class="ticketMeta ticketMeta--place">{{ eventPlace }}</p>
            </div>

            <div class="ticketPerforated" aria-hidden="true"></div>

            <div class="ticketFooter">
              <div class="nameRow">
                <span class="nameRow__label">Meno pozorovateľa</span>
                <strong class="nameRow__value">{{ attendeeNamePreview }}</strong>
              </div>
            </div>
          </article>
        </div>
      </div>
    </section>
  </div>
