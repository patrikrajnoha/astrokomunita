x-backend-common-env: &backend-common-env
  APP_ENV: local
  APP_DEBUG: "true"
  CACHE_STORE: file
  BROADCAST_CONNECTION: reverb
  REVERB_SERVER_HOST: 0.0.0.0
  REVERB_SERVER_PORT: "8080"
  REVERB_SERVER_PATH: ""
  REVERB_HOST: reverb
  REVERB_PORT: "8080"
  REVERB_SCHEME: http
  REVERB_APP_ID: ${REVERB_APP_ID:-local-app-id}
  REVERB_APP_KEY: ${REVERB_APP_KEY:-local-app-key}
  REVERB_APP_SECRET: ${REVERB_APP_SECRET:-local-app-secret}
  OBSERVING_SKY_MICROSERVICE_BASE: http://sky:8010
  QUEUE_CONNECTION: database
  DB_HOST: mysql
  MODERATION_BASE_URL: http://moderation:8090
  LIBRETRANSLATE_BASE_URL: http://libretranslate:5000
  TRANSLATION_SERVICE_URL: http://sky:8010
  TRANSLATION_PROVIDER: libretranslate
  TRANSLATION_FALLBACK_PROVIDER: none

x-backend-service: &backend-service
  build:
    context: ./backend
    dockerfile: Dockerfile
  image: astrokomunita-backend:local
  working_dir: /var/www/html
  env_file:
    - ./backend/.env
  environment: *backend-common-env
  volumes:
    - ./backend:/var/www/html
    - backend_vendor:/var/www/html/vendor
  restart: unless-stopped

services:
  sky:
    build:
      context: ./services/sky
      dockerfile: Dockerfile
    container_name: astrokomunita-sky
    working_dir: /app
    environment:
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-change-me}
    volumes:
      - ./services/sky/app:/app/app
      - ./services/sky/data:/app/data
    ports:
      - "8010:8010"
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: astrokomunita-frontend
    working_dir: /app
    env_file:
      - ./frontend/.env
    environment:
      VITE_REVERB_APP_KEY: ${REVERB_APP_KEY:-local-app-key}
      VITE_REVERB_HOST: ${VITE_REVERB_HOST:-127.0.0.1}
      VITE_REVERB_PORT: ${VITE_REVERB_PORT:-8080}
      VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-http}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -lc "npm ci && npm run dev -- --host 0.0.0.0 --port 5174"
    ports:
      - "5174:5174"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    <<: *backend-service
    container_name: astrokomunita-backend
    environment:
      <<: *backend-common-env
      APP_URL: http://127.0.0.1:8001
    command: sh -lc "if [ ! -f vendor/autoload.php ]; then composer install --no-interaction --no-progress; fi && php artisan bots:sources:sync --quiet-summary && php artisan serve --host=0.0.0.0 --port=8001"
    ports:
      - "8001:8001"
    depends_on:
      mysql:
        condition: service_healthy
      moderation:
        condition: service_started
      libretranslate:
        condition: service_started
      sky:
        condition: service_started

  queue-worker:
    <<: *backend-service
    container_name: astrokomunita-queue-worker
    command: sh -lc "if [ ! -f vendor/autoload.php ]; then composer install --no-interaction --no-progress; fi && php artisan bots:sources:sync --quiet-summary && php artisan queue:work --sleep=1 --tries=5 --timeout=120"
    depends_on:
      backend:
        condition: service_started
      mysql:
        condition: service_healthy
      libretranslate:
        condition: service_started
      sky:
        condition: service_started

  scheduler:
    <<: *backend-service
    container_name: astrokomunita-scheduler
    command: sh -lc "if [ ! -f vendor/autoload.php ]; then composer install --no-interaction --no-progress; fi && php artisan schedule:work"
    depends_on:
      backend:
        condition: service_started
      mysql:
        condition: service_healthy
      libretranslate:
        condition: service_started
      sky:
        condition: service_started

  reverb:
    <<: *backend-service
    container_name: astrokomunita-reverb
    command: sh -lc "if [ ! -f vendor/autoload.php ]; then composer install --no-interaction --no-progress; fi && php artisan reverb:start --host=0.0.0.0 --port=8080"
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_started
      mysql:
        condition: service_healthy
      libretranslate:
        condition: service_started
      sky:
        condition: service_started

  mysql:
    image: mysql:8.4
    container_name: astrokomunita-mysql
    environment:
      MYSQL_DATABASE: astrokomunita
      MYSQL_USER: astro
      MYSQL_PASSWORD: astro
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  moderation:
    build:
      context: ./moderation-service
    container_name: astrokomunita-moderation
    environment:
      MODERATION_INTERNAL_TOKEN: ${MODERATION_INTERNAL_TOKEN:-change-me}
      MODERATION_TEXT_MODEL: ${MODERATION_TEXT_MODEL:-unitary/toxic-bert}
      MODERATION_HATE_MODEL: ${MODERATION_HATE_MODEL:-cardiffnlp/twitter-roberta-base-hate-latest}
      MODERATION_ENABLE_HATE_MODEL: ${MODERATION_ENABLE_HATE_MODEL:-true}
      MODERATION_IMAGE_MODEL: ${MODERATION_IMAGE_MODEL:-Falconsai/nsfw_image_detection}
      MODERATION_TEXT_FLAG_THRESHOLD: ${MODERATION_TEXT_FLAG_THRESHOLD:-0.70}
      MODERATION_TEXT_BLOCK_THRESHOLD: ${MODERATION_TEXT_BLOCK_THRESHOLD:-0.90}
      MODERATION_IMAGE_FLAG_THRESHOLD: ${MODERATION_IMAGE_FLAG_THRESHOLD:-0.60}
      MODERATION_IMAGE_BLOCK_THRESHOLD: ${MODERATION_IMAGE_BLOCK_THRESHOLD:-0.85}
      MODERATION_IMAGE_MAX_BYTES: ${MODERATION_IMAGE_MAX_BYTES:-5242880}
    ports:
      - "8090:8090"
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: astrokomunita-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: astrokomunita-libretranslate
    restart: unless-stopped

volumes:
  backend_vendor:
  frontend_node_modules:
  mysql_data:
